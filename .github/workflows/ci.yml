  notify:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [checks, test_inventory, unit_test_entry_default, harmonyos_build]
    if: always()

    steps:
      - name: Check job statuses
        shell: bash
        run: |
          set -euo pipefail

          echo "## Build Status Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Checks | ${{ needs.checks.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Inventory | ${{ needs.test_inventory.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| entry@default Unit Tests | ${{ needs.unit_test_entry_default.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build entry@default HAP | ${{ needs.harmonyos_build.result }} |" >> "$GITHUB_STEP_SUMMARY"

          HAP_BUILD_REQUIRED=false
          if [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ vars.HARMONYOS_CI_ENABLED }}" == "true" ]]; then
            HAP_BUILD_REQUIRED=true
          fi

          if [[ "${{ needs.checks.result }}" != "success" ]] || \
             [[ "${{ needs.test_inventory.result }}" != "success" ]] || \
             [[ "${{ needs.unit_test_entry_default.result }}" != "success" ]] || \
             { [[ "$HAP_BUILD_REQUIRED" == "true" ]] && [[ "${{ needs.harmonyos_build.result }}" != "success" ]]; }; then
            echo "CI/CD pipeline failed"
            echo "Required jobs must finish with success. HAP build is required for push events and optional for pull requests."
            exit 1
          fi

          echo "CI/CD pipeline completed"

  #         name: signed-hap
  #         path: hapsigner/signApp.hap
  #         retention-days: 30

  notify:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [checks, test, harmonyos_build]
    if: always()

    steps:
      - name: Check job statuses
        shell: bash
        run: |
          set -euo pipefail

          echo "## Build Status Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Checks | ${{ needs.checks.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | ${{ needs.test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HarmonyOS Build | ${{ needs.harmonyos_build.result }} |" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.checks.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.harmonyos_build.result }}" == "failure" ]]; then
            echo "CI/CD pipeline failed"
            exit 1
          fi

          echo "CI/CD pipeline completed"

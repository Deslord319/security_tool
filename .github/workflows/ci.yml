name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '18'
  JAVA_VERSION: '11'
  HARMONYOS_SDK_VERSION: '6.0.2'

jobs:
  checks:
    name: Repository Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm install --prefer-offline || echo "npm install failed, continuing"

      - name: HarmonyOS SDK note
        run: |
          echo "GitHub-hosted runners do not provide the HarmonyOS SDK toolchain."
          echo "This workflow only runs repository checks by default."
          echo "Real HAP build/sign steps should move to a self-hosted runner later."

      - name: Verify workflow inputs
        run: |
          echo "package-lock.json: $(if [ -f package-lock.json ]; then echo present; else echo missing; fi)"
          echo "hvigorw: $(if [ -f hvigorw ]; then echo present; else echo missing; fi)"
          echo "hvigorw.bat: $(if [ -f hvigorw.bat ]; then echo present; else echo missing; fi)"

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Install dependencies
        run: |
          echo "Installing test dependencies..."
          npm install --prefer-offline || echo "npm install failed, continuing"

      - name: Report test execution policy
        run: |
          echo "HarmonyOS unit tests are not executed on GitHub-hosted runners by default."
          echo "Add a self-hosted runner with the HarmonyOS toolchain when you are ready."

      - name: Collect test inventory
        shell: bash
        run: |
          set -euo pipefail
          TEST_FILE_COUNT=$(find entry/src/test -name "*.test.ets" | wc -l)
          echo ""
          echo "Test statistics:"
          echo "  Unit test files: $TEST_FILE_COUNT"

      - name: Generate test report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Test Report"
            echo "==========="
            echo ""
            echo "Date: $(date)"
            echo "Ref: ${GITHUB_REF}"
            echo "Commit: ${GITHUB_SHA}"
            echo ""
            echo "Test Files:"
            find entry/src/test -name "*.test.ets"
            echo ""
            echo "Coverage Target: 80%"
          } > test-report.txt

          cat test-report.txt

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.txt
          retention-days: 7

      - name: Coverage note
        run: |
          echo "Coverage baseline is maintained separately from this workflow."

  harmonyos_build:
    name: HarmonyOS Build And Sign
    runs-on: [self-hosted, harmonyos]
    needs: [checks, test]
    if: false

    steps:
      - name: Placeholder
        run: |
          echo "Enable this job after provisioning a self-hosted runner with the HarmonyOS toolchain."
          echo "Expected runner labels: self-hosted, harmonyos"
          echo "Typical responsibilities:"
          echo "  1. Build unsigned HAP with hvigorw"
          echo "  2. Copy the HAP into hapsigner/"
          echo "  3. Generate or reuse the p7b profile"
          echo "  4. Sign the HAP"
          echo "  5. Upload the signed HAP artifact"

  # Example self-hosted implementation reference:

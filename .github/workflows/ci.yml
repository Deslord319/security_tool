  notify:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [checks, test_inventory, unit_test_entry_default, harmonyos_build]
    if: always()

    steps:
      - name: Check job statuses
        shell: bash
        run: |
          set -euo pipefail

          echo "## Build Status Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Checks | ${{ needs.checks.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Inventory | ${{ needs.test_inventory.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| entry@default Unit Tests | ${{ needs.unit_test_entry_default.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HarmonyOS Build | ${{ needs.harmonyos_build.result }} |" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.checks.result }}" == "failure" ]] || \
             [[ "${{ needs.test_inventory.result }}" == "failure" ]] || \
             [[ "${{ needs.unit_test_entry_default.result }}" == "failure" ]] || \
             [[ "${{ needs.harmonyos_build.result }}" == "failure" ]]; then
            echo "CI/CD pipeline failed"
            exit 1
          fi

          echo "CI/CD pipeline completed"

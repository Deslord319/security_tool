name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '18'
  JAVA_VERSION: '11'
  HARMONYOS_SDK_VERSION: '6.0.2'

permissions:
  contents: read

jobs:
  checks:
    name: Repository Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm install --prefer-offline || echo "npm install failed, continuing"

      - name: HarmonyOS SDK note
        run: |
          echo "GitHub-hosted runners do not provide the HarmonyOS SDK toolchain."
          echo "This workflow only runs repository checks by default."
          echo "Real HAP build/sign steps should move to a self-hosted runner later."

      - name: Verify workflow inputs
        run: |
          echo "package-lock.json: $(if [ -f package-lock.json ]; then echo present; else echo missing; fi)"
          echo "hvigorw: $(if [ -f hvigorw ]; then echo present; else echo missing; fi)"
          echo "hvigorw.bat: $(if [ -f hvigorw.bat ]; then echo present; else echo missing; fi)"

  test_inventory:
    name: List Test Cases
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Install dependencies
        run: |
          echo "Installing test dependencies..."
          npm install --prefer-offline || echo "npm install failed, continuing"

      - name: Report test execution policy
        run: |
          echo "HarmonyOS unit tests are not executed on GitHub-hosted runners by default."
          echo "This job only reports test inventory until a self-hosted runner is configured."

      - name: Collect test inventory
        shell: bash
        run: |
          set -euo pipefail
          TEST_FILE_COUNT=$(find entry/src/test -name "*.test.ets" | wc -l)
          echo ""
          echo "Test inventory:"
          echo "  Unit test files: $TEST_FILE_COUNT"

      - name: Generate test inventory report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Test Inventory Report"
            echo "====================="
            echo ""
            echo "Date: $(date)"
            echo "Ref: ${GITHUB_REF}"
            echo "Commit: ${GITHUB_SHA}"
            echo ""
            echo "Execution:"
            echo "  Not executed on GitHub-hosted runner"
            echo ""
            echo "Test Files:"
            find entry/src/test -name "*.test.ets"
            echo ""
            echo "Coverage Target: 80%"
          } > test-report.txt

          cat test-report.txt

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-report
          path: test-report.txt
          retention-days: 7

      - name: Coverage note
        run: |
          echo "Coverage baseline is maintained separately from this workflow."
          echo "Actual test execution requires a self-hosted HarmonyOS runner."

  unit_test_entry_default:
    name: Run entry@default Unit Tests
    runs-on: [self-hosted, windows, harmonyos]
    needs: checks
    if: (github.event_name == 'pull_request' || github.event_name == 'push') && vars.HARMONYOS_CI_ENABLED == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Install dependencies
        shell: powershell
        run: |
          npm install --prefer-offline

      - name: Resolve hvigorw path
        shell: powershell
        run: |
          $candidates = @()
          if ($env:DEVECOSTUDIO_HOME) {
            $candidates += (Join-Path $env:DEVECOSTUDIO_HOME 'tools\hvigor\bin\hvigorw.bat')
          }
          $candidates += 'C:\Program Files\Huawei\DevEco Studio\tools\hvigor\bin\hvigorw.bat'

          $hvigorw = $null
          foreach ($candidate in $candidates) {
            if ($candidate -and (Test-Path -LiteralPath $candidate)) {
              $hvigorw = $candidate
              break
            }
          }

          if (-not $hvigorw) {
            Write-Error 'hvigorw.bat was not found. Set DEVECOSTUDIO_HOME or install DevEco Studio under C:\Program Files\Huawei\DevEco Studio.'
          }

          "HVIGORW_PATH=$hvigorw" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using hvigorw: $hvigorw"

      - name: Run entry@default tests
        shell: powershell
        run: |
          & "$env:HVIGORW_PATH" --no-daemon test --mode module -p product=default -p module=entry@default

      - name: Publish test summary
        if: always()
        shell: powershell
        run: |
          $testResult = 'entry/.test/default/intermediates/test/coverage_data/test_result.txt'
          $coverageReport = 'entry/.test/default/outputs/test/reports/coverageReport.json'

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## entry@default Unit Test Summary'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''

          if (Test-Path -LiteralPath $testResult) {
            $resultText = (Get-Content -LiteralPath $testResult -Raw -Encoding utf8).Trim()
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $resultText
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'test_result.txt not found'
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''

          if (Test-Path -LiteralPath $coverageReport) {
            $coverage = Get-Content -LiteralPath $coverageReport -Raw -Encoding utf8 | ConvertFrom-Json
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Metric | Covered | Total | Rate |"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "|---|---:|---:|---:|"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Lines | $($coverage.lines.hit) | $($coverage.lines.found) | $($coverage.lines.pct)% |"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Functions | $($coverage.functions.hit) | $($coverage.functions.found) | $($coverage.functions.pct)% |"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Branches | $($coverage.branches.hit) | $($coverage.branches.found) | $($coverage.branches.pct)% |"
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'coverageReport.json not found'
          }

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: entry-default-unit-test-report
          path: |
            entry/.test/default/intermediates/test/coverage_data/test_result.txt
            entry/.test/default/outputs/test/reports/index.html
            entry/.test/default/outputs/test/reports/coverageReport.json
          retention-days: 7

  harmonyos_build:
    name: HarmonyOS Build And Sign
    runs-on: [self-hosted, harmonyos]
    needs: [checks, test_inventory, unit_test_entry_default]
    if: false

    steps:
      - name: Placeholder
        run: |
          echo "Enable this job after provisioning a self-hosted runner with the HarmonyOS toolchain."
          echo "Expected runner labels: self-hosted, harmonyos"
          echo "Minimum Actions Runner version for Node 24-based actions: v2.327.1"
          echo "Typical responsibilities:"
          echo "  1. Build unsigned HAP with hvigorw"
          echo "  2. Copy the HAP into hapsigner/"
          echo "  3. Generate or reuse the p7b profile"
          echo "  4. Sign the HAP"
          echo "  5. Upload the signed HAP artifact"


name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop, 'codex/**']
    tags: ['v*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  JAVA_VERSION: '11'
  HARMONYOS_SDK_VERSION: '6.0.2'

permissions:
  contents: read

jobs:
  checks:
    name: Repository Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm install --prefer-offline || echo "npm install failed, continuing"

      - name: HarmonyOS SDK note
        run: |
          echo "GitHub-hosted runners do not provide the HarmonyOS SDK toolchain."
          echo "Repository checks run here; HarmonyOS unit tests and HAP build run on the required self-hosted harmonyos runner jobs."

      - name: Verify workflow inputs
        run: |
          echo "package-lock.json: $(if [ -f package-lock.json ]; then echo present; else echo missing; fi)"
          echo "hvigorw: $(if [ -f hvigorw ]; then echo present; else echo missing; fi)"
          echo "hvigorw.bat: $(if [ -f hvigorw.bat ]; then echo present; else echo missing; fi)"

  test_inventory:
    name: List Test Cases
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Install dependencies
        run: |
          echo "Installing test dependencies..."
          npm install --prefer-offline || echo "npm install failed, continuing"

      - name: Report test execution policy
        run: |
          echo "This job reports test inventory only."
          echo "HarmonyOS unit tests are executed by the required self-hosted entry@default unit test job."

      - name: Collect test inventory
        shell: bash
        run: |
          set -euo pipefail
          TEST_FILE_COUNT=$(find entry/src/test -name "*.test.ets" | wc -l)
          echo ""
          echo "Test inventory:"
          echo "  Unit test files: $TEST_FILE_COUNT"

      - name: Generate test inventory report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Test Inventory Report"
            echo "====================="
            echo ""
            echo "Date: $(date)"
            echo "Ref: ${GITHUB_REF}"
            echo "Commit: ${GITHUB_SHA}"
            echo ""
            echo "Execution:"
            echo "  Inventory only; real unit execution runs in the self-hosted HarmonyOS unit test job"
            echo ""
            echo "Test Files:"
            find entry/src/test -name "*.test.ets"
            echo ""
            echo "Coverage Target: 80%"
          } > test-report.txt

          cat test-report.txt

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-report
          path: test-report.txt
          retention-days: 7

      - name: Coverage note
        run: |
          echo "Coverage baseline is maintained separately from this workflow."
          echo "Actual unit test execution is enforced by the self-hosted HarmonyOS unit test job."

  unit_test_entry_default:
    name: Run entry@default Unit Tests
    runs-on: [self-hosted, windows, harmonyos]
    needs: checks
    if: (github.event_name == 'pull_request' || github.event_name == 'push') && vars.HARMONYOS_CI_ENABLED == 'true'

    steps:
      - name: Checkout code
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $repo = $env:GITHUB_REPOSITORY
          $sha = $env:GITHUB_SHA
          $zipPath = Join-Path $env:RUNNER_TEMP "source-$sha.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "source-$sha"
          Remove-Item -LiteralPath $zipPath -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $extractPath -Recurse -Force -ErrorAction SilentlyContinue

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            'User-Agent' = 'security-tool-ci'
            Accept = 'application/vnd.github+json'
          }
          Invoke-WebRequest -Uri "https://api.github.com/repos/$repo/zipball/$sha" -Headers $headers -OutFile $zipPath
          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractPath -Force
          $sourceRoot = Get-ChildItem -LiteralPath $extractPath -Directory | Select-Object -First 1
          if (-not $sourceRoot) {
            Write-Error 'Downloaded source archive is empty.'
          }

          function Remove-WorkspaceItem([System.IO.FileSystemInfo] $item) {
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              if (-not (Test-Path -LiteralPath $item.FullName)) {
                return
              }
              try {
                Remove-Item -LiteralPath $item.FullName -Recurse -Force -ErrorAction Stop
                return
              } catch [System.IO.DirectoryNotFoundException] {
                return
              } catch [System.IO.FileNotFoundException] {
                return
              } catch {
                if ($attempt -eq 3) {
                  Write-Warning "Workspace cleanup skipped stale item after retries: $($item.FullName) - $($_.Exception.Message)"
                  return
                }
                Start-Sleep -Milliseconds (200 * $attempt)
              }
            }
          }

          Get-ChildItem -LiteralPath (Get-Location) -Force |
            Where-Object { $_.Name -ne '.git' } |
            ForEach-Object { Remove-WorkspaceItem $_ }
          Get-ChildItem -LiteralPath $sourceRoot.FullName -Force |
            Copy-Item -Destination (Get-Location) -Recurse -Force

          Write-Host "Checked out $repo@$sha via GitHub archive."

      - name: Install dependencies
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          if (Test-Path -LiteralPath 'package.json') {
            npm install --prefer-offline
          } else {
            Write-Host 'package.json not found at repository root, skipping npm install.'
          }

      - name: Resolve local HarmonyOS toolchain
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $candidates = @()
          $javaCandidates = @()
          if ($env:DEVECOSTUDIO_HOME) {
            $candidates += (Join-Path $env:DEVECOSTUDIO_HOME 'tools\hvigor\bin\hvigorw.bat')
            $javaCandidates += (Join-Path $env:DEVECOSTUDIO_HOME 'jbr')
          }
          $candidates += 'C:\Program Files\Huawei\DevEco Studio\tools\hvigor\bin\hvigorw.bat'
          $javaCandidates += 'C:\Program Files\Huawei\DevEco Studio\jbr'
          $ohpmCandidates = @()
          $sdkCandidates = @()
          if ($env:DEVECOSTUDIO_HOME) {
            $ohpmCandidates += (Join-Path $env:DEVECOSTUDIO_HOME 'tools\ohpm\bin\ohpm.bat')
            $sdkCandidates += (Join-Path $env:DEVECOSTUDIO_HOME 'sdk')
          }
          $ohpmCandidates += 'C:\Program Files\Huawei\DevEco Studio\tools\ohpm\bin\ohpm.bat'
          $sdkCandidates += 'C:\Program Files\Huawei\DevEco Studio\sdk'

          $hvigorw = $null
          foreach ($candidate in $candidates) {
            if ($candidate -and (Test-Path -LiteralPath $candidate)) {
              $hvigorw = $candidate
              break
            }
          }

          if (-not $hvigorw) {
            Write-Error 'hvigorw.bat was not found. Set DEVECOSTUDIO_HOME or install DevEco Studio under C:\Program Files\Huawei\DevEco Studio.'
          }

          $nodeHome = if ($env:NODE_HOME -and (Test-Path -LiteralPath (Join-Path $env:NODE_HOME 'node.exe'))) {
            $env:NODE_HOME
          } else {
            $nodeCommand = Get-Command node -ErrorAction SilentlyContinue
            if ($nodeCommand) {
              Split-Path -Path $nodeCommand.Source -Parent
            } else {
              $null
            }
          }
          if (-not $nodeHome) {
            Write-Error 'Node.js was not found.'
          }

          $javaHome = $null
          foreach ($candidate in $javaCandidates) {
            if ($candidate -and (Test-Path -LiteralPath (Join-Path $candidate 'bin\java.exe'))) {
              $javaHome = $candidate
              break
            }
          }
          if (-not $javaHome -and $env:JAVA_HOME -and (Test-Path -LiteralPath (Join-Path $env:JAVA_HOME 'bin\java.exe'))) {
            $javaHome = $env:JAVA_HOME
          }

          if (-not $javaHome) {
            Write-Error 'Java runtime was not found.'
          }

          $ohpmPath = $null
          foreach ($candidate in $ohpmCandidates) {
            if ($candidate -and (Test-Path -LiteralPath $candidate)) {
              $ohpmPath = $candidate
              break
            }
          }

          if (-not $ohpmPath) {
            Write-Error 'ohpm.bat was not found.'
          }

          $devecoSdkHome = $null
          foreach ($candidate in $sdkCandidates) {
            if ($candidate -and (Test-Path -LiteralPath (Join-Path $candidate 'default\sdk-pkg.json'))) {
              $devecoSdkHome = $candidate
              break
            }
          }

          if (-not $devecoSdkHome) {
            Write-Error 'DevEco SDK was not found.'
          }

          $hvigorUserHome = Join-Path 'C:\hvigor-ci' ("user-home-" + $env:GITHUB_RUN_ID + '-' + $env:GITHUB_JOB + '-' + $env:GITHUB_RUN_ATTEMPT)
          New-Item -ItemType Directory -Path $hvigorUserHome -Force | Out-Null
          $npmCache = Join-Path $hvigorUserHome 'npm-cache'
          $pnpmHome = Join-Path $hvigorUserHome 'pnpm-home'
          New-Item -ItemType Directory -Path $npmCache -Force | Out-Null
          New-Item -ItemType Directory -Path $pnpmHome -Force | Out-Null
          if ($hvigorUserHome -match '\s') {
            Write-Error "HVIGOR_USER_HOME must not contain spaces: $hvigorUserHome"
          }

          $realDevecoSdkHome = $devecoSdkHome
          $sdkOverlayHome = Join-Path 'C:\hvigor-ci' ("sdk-overlay-" + $env:GITHUB_RUN_ID + '-' + $env:GITHUB_JOB + '-' + $env:GITHUB_RUN_ATTEMPT)
          $overlayDefault = Join-Path $sdkOverlayHome 'default'
          $overlayOpenHarmony = Join-Path $overlayDefault 'openharmony'
          $realDefault = Join-Path $realDevecoSdkHome 'default'
          $realOpenHarmony = Join-Path $realDefault 'openharmony'
          Remove-Item -LiteralPath $sdkOverlayHome -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $overlayDefault -Force | Out-Null
          Copy-Item -LiteralPath (Join-Path $realDefault 'sdk-pkg.json') -Destination (Join-Path $overlayDefault 'sdk-pkg.json') -Force

          Get-ChildItem -LiteralPath $realDefault -Force | Where-Object { $_.Name -ne 'openharmony' -and $_.Name -ne 'sdk-pkg.json' } | ForEach-Object {
            $target = Join-Path $overlayDefault $_.Name
            if ($_.PSIsContainer) {
              New-Item -ItemType Junction -Path $target -Target $_.FullName | Out-Null
            } else {
              Copy-Item -LiteralPath $_.FullName -Destination $target -Force
            }
          }

          New-Item -ItemType Directory -Path $overlayOpenHarmony -Force | Out-Null
          Get-ChildItem -LiteralPath $realOpenHarmony -Force | Where-Object { $_.Name -ne 'previewer' } | ForEach-Object {
            $target = Join-Path $overlayOpenHarmony $_.Name
            if ($_.PSIsContainer) {
              New-Item -ItemType Junction -Path $target -Target $_.FullName | Out-Null
            } else {
              Copy-Item -LiteralPath $_.FullName -Destination $target -Force
            }
          }

          $realPreviewer = Join-Path $realOpenHarmony 'previewer'
          $overlayPreviewer = Join-Path $overlayOpenHarmony 'previewer'
          New-Item -ItemType Directory -Path $overlayPreviewer -Force | Out-Null
          Get-ChildItem -LiteralPath $realPreviewer -Force | Where-Object { $_.Name -ne 'common' } | ForEach-Object {
            $target = Join-Path $overlayPreviewer $_.Name
            if ($_.PSIsContainer) {
              New-Item -ItemType Junction -Path $target -Target $_.FullName | Out-Null
            } else {
              Copy-Item -LiteralPath $_.FullName -Destination $target -Force
            }
          }

          $realCommon = Join-Path $realPreviewer 'common'
          $overlayCommon = Join-Path $overlayPreviewer 'common'
          New-Item -ItemType Directory -Path $overlayCommon -Force | Out-Null
          Get-ChildItem -LiteralPath $realCommon -Force | Where-Object { $_.Name -ne 'resources' } | ForEach-Object {
            $target = Join-Path $overlayCommon $_.Name
            if ($_.PSIsContainer) {
              New-Item -ItemType Junction -Path $target -Target $_.FullName | Out-Null
            } else {
              Copy-Item -LiteralPath $_.FullName -Destination $target -Force
            }
          }

          $realResources = Join-Path $realCommon 'resources'
          $overlayResources = Join-Path $overlayCommon 'resources'
          New-Item -ItemType Directory -Path $overlayResources -Force | Out-Null
          Get-ChildItem -LiteralPath $realResources -Force | Where-Object { $_.Name -ne 'module.json' } | ForEach-Object {
            $target = Join-Path $overlayResources $_.Name
            if ($_.PSIsContainer) {
              New-Item -ItemType Junction -Path $target -Target $_.FullName | Out-Null
            } else {
              Copy-Item -LiteralPath $_.FullName -Destination $target -Force
            }
          }
          Copy-Item -LiteralPath '.github\ci\openharmony-previewer-module.json' -Destination (Join-Path $overlayResources 'module.json') -Force
          node -e "const fs=require('fs'); JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log('SDK overlay module.json valid')" (Join-Path $overlayResources 'module.json')
          $devecoSdkHome = $sdkOverlayHome

          function New-NoSpaceToolLink([string] $name, [string] $targetPath) {
            if ($targetPath -notmatch '\s') {
              return $targetPath
            }
            $linkRoot = Join-Path 'C:\hvigor-ci\tool-links' ($env:GITHUB_RUN_ID + '-' + $env:GITHUB_JOB + '-' + $env:GITHUB_RUN_ATTEMPT)
            New-Item -ItemType Directory -Path $linkRoot -Force | Out-Null
            $linkPath = Join-Path $linkRoot $name
            if (Test-Path -LiteralPath $linkPath) {
              Remove-Item -LiteralPath $linkPath -Force
            }
            New-Item -ItemType Junction -Path $linkPath -Target $targetPath | Out-Null
            return $linkPath
          }

          $nodeHome = New-NoSpaceToolLink -name 'node' -targetPath $nodeHome
          $javaHome = New-NoSpaceToolLink -name 'jbr' -targetPath $javaHome
          if ($nodeHome -match '\s') {
            Write-Error "NODE_HOME must not contain spaces for hvigor pnpm bootstrap: $nodeHome"
          }
          if ($javaHome -match '\s') {
            Write-Error "JAVA_HOME must not contain spaces for hvigor: $javaHome"
          }

          "HVIGORW_PATH=$hvigorw" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NODE_HOME=$nodeHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OHPM_PATH=$ohpmPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "JAVA_HOME=$javaHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "REAL_DEVECO_SDK_HOME=$realDevecoSdkHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "DEVECO_SDK_HOME=$devecoSdkHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HVIGOR_USER_HOME=$hvigorUserHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NPM_CONFIG_CACHE=$npmCache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NPM_CONFIG_PREFIX=$pnpmHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PNPM_HOME=$pnpmHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$nodeHome" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$pnpmHome" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$javaHome\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Using hvigorw: $hvigorw"
          Write-Host "Using NODE_HOME: $nodeHome"
          Write-Host "Using ohpm: $ohpmPath"
          Write-Host "Using JAVA_HOME: $javaHome"
          Write-Host "Using REAL_DEVECO_SDK_HOME: $realDevecoSdkHome"
          Write-Host "Using DEVECO_SDK_HOME: $devecoSdkHome"
          Write-Host "Using HVIGOR_USER_HOME: $hvigorUserHome"
          Write-Host "Using NPM_CONFIG_CACHE: $npmCache"
          Write-Host "Using NPM_CONFIG_PREFIX: $pnpmHome"
          Write-Host "Using PNPM_HOME: $pnpmHome"

      - name: Install pnpm for hvigor
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $env:PATH = "$env:NODE_HOME;$env:PNPM_HOME;$env:JAVA_HOME\bin;$env:PATH"
          $npm = Join-Path $env:NODE_HOME 'npm.cmd'
          if (-not (Test-Path -LiteralPath $npm)) {
            Write-Error "npm.cmd was not found under NODE_HOME: $npm"
          }
          & $npm --version
          $wrapperTools = Join-Path $env:HVIGOR_USER_HOME 'wrapper\tools'
          New-Item -ItemType Directory -Path $wrapperTools -Force | Out-Null
          & $npm install --prefix "$wrapperTools" "pnpm@10.27.0"
          $pnpm = Join-Path $wrapperTools 'node_modules\.bin\pnpm.cmd'
          if (-not (Test-Path -LiteralPath $pnpm)) {
            Write-Error "pnpm.cmd was not installed under hvigor wrapper tools: $pnpm"
          }
          & $pnpm --version

      - name: Install Harmony dependencies
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          if (Test-Path -LiteralPath 'oh-package.json5') {
            & "$env:OHPM_PATH" install
          } else {
            Write-Host 'oh-package.json5 not found, skipping ohpm install.'
          }

      - name: Run entry@default tests
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $realRestool = Join-Path $env:REAL_DEVECO_SDK_HOME 'default\openharmony\toolchains\restool.exe'
          $overlayRestool = Join-Path $env:DEVECO_SDK_HOME 'default\openharmony\toolchains\restool.exe'
          foreach ($tool in @(@{ Name = 'real'; Path = $realRestool }, @{ Name = 'overlay'; Path = $overlayRestool })) {
            Write-Host "Checking $($tool.Name) restool: $($tool.Path)"
            if (-not (Test-Path -LiteralPath $tool.Path)) {
              Write-Error "restool.exe missing at $($tool.Path)"
            }
            icacls $tool.Path
            try {
              & $tool.Path 2>&1 | Select-Object -First 5 | ForEach-Object { Write-Host $_ }
            } catch {
              Write-Error "restool.exe could not be executed from $($tool.Path): $($_.Exception.Message)"
            }
          }
          & "$env:HVIGORW_PATH" --no-daemon test --mode module -p product=default -p module=entry@default

      - name: Render static coverage report
        if: always()
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $coverageReport = 'entry/.test/default/outputs/test/reports/coverageReport.json'
          $reportHtml = 'entry/.test/default/outputs/test/reports/index.html'
          if (Test-Path -LiteralPath $coverageReport) {
            $coverage = Get-Content -LiteralPath $coverageReport -Raw -Encoding utf8 | ConvertFrom-Json
            $files = @($coverage.files | Sort-Object path)
            $escape = [System.Net.WebUtility]
            $rows = New-Object System.Collections.Generic.List[string]
            foreach ($file in $files) {
              $path = $escape::HtmlEncode([string]$file.path)
              $link = $escape::HtmlEncode([string]$file.link)
              $linePct = '{0:N2}' -f [double]$file.summary.lines.pct
              $funcPct = '{0:N2}' -f [double]$file.summary.functions.pct
              $branchPct = '{0:N2}' -f [double]$file.summary.branches.pct
              $lineCovered = [int]$file.summary.lines.covered
              $lineTotal = [int]$file.summary.lines.total
              $funcCovered = [int]$file.summary.functions.covered
              $funcTotal = [int]$file.summary.functions.total
              $branchCovered = [int]$file.summary.branches.covered
              $branchTotal = [int]$file.summary.branches.total
              $rowClass = if ([double]$file.summary.lines.pct -ge 70) { 'good' } elseif ([double]$file.summary.lines.pct -ge 33) { 'warn' } else { 'bad' }
              $rows.Add("      <tr class=""$rowClass"">")
              $rows.Add("        <td><a href=""$link"">$path</a></td>")
              $rows.Add("        <td>$funcPct%</td>")
              $rows.Add("        <td>$funcCovered / $funcTotal</td>")
              $rows.Add("        <td>$branchPct%</td>")
              $rows.Add("        <td>$branchCovered / $branchTotal</td>")
              $rows.Add("        <td>$linePct%</td>")
              $rows.Add("        <td>$lineCovered / $lineTotal</td>")
              $rows.Add("      </tr>")
            }
            $generatedAt = $escape::HtmlEncode([string]$(if ($coverage.date) { $coverage.date } else { Get-Date }))
            $html = New-Object System.Collections.Generic.List[string]
            $html.Add('<!doctype html>')
            $html.Add('<html lang="en">')
            $html.Add('<head>')
            $html.Add('  <meta charset="utf-8" />')
            $html.Add('  <meta name="viewport" content="width=device-width, initial-scale=1" />')
            $html.Add('  <title>Coverage Report</title>')
            $html.Add('  <style>')
            $html.Add('    body { margin: 0; padding: 24px; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; background: #f5f7fb; color: #1f2a37; }')
            $html.Add('    h1 { margin: 0 0 8px; font-size: 28px; }')
            $html.Add('    p.meta { margin: 0 0 24px; color: #6b7280; }')
            $html.Add('    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }')
            $html.Add('    .card { background: #fff; border: 1px solid #d9e2f1; border-radius: 12px; padding: 18px; box-shadow: 0 6px 20px rgba(15, 23, 42, 0.04); }')
            $html.Add('    .card h2 { margin: 0 0 8px; font-size: 14px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; }')
            $html.Add('    .card .pct { font-size: 32px; font-weight: 700; margin-bottom: 6px; }')
            $html.Add('    .card .count { color: #6b7280; font-size: 14px; }')
            $html.Add('    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #d9e2f1; border-radius: 12px; overflow: hidden; box-shadow: 0 6px 20px rgba(15, 23, 42, 0.04); }')
            $html.Add('    th, td { padding: 12px 14px; border-bottom: 1px solid #d9e2f1; text-align: left; vertical-align: top; font-size: 14px; }')
            $html.Add('    th { background: #eef4ff; font-weight: 700; }')
            $html.Add('    tr.good { background: #dff4e8; }')
            $html.Add('    tr.warn { background: #fff2d8; }')
            $html.Add('    tr.bad { background: #fde4e4; }')
            $html.Add('    tr:last-child td { border-bottom: none; }')
            $html.Add('    a { color: #0057b8; text-decoration: none; word-break: break-all; }')
            $html.Add('    a:hover { text-decoration: underline; }')
            $html.Add('  </style>')
            $html.Add('</head>')
            $html.Add('<body>')
            $html.Add('  <h1>All Files Coverage</h1>')
            $html.Add("  <p class=""meta"">Generated at $generatedAt</p>")
            $html.Add('  <div class="cards">')
            $html.Add('    <section class="card">')
            $html.Add('      <h2>Functions</h2>')
            $html.Add("      <div class=""pct"">$('{0:N2}' -f [double]$coverage.summary.functions.pct)%</div>")
            $html.Add("      <div class=""count"">$([int]$coverage.summary.functions.covered) / $([int]$coverage.summary.functions.total)</div>")
            $html.Add('    </section>')
            $html.Add('    <section class="card">')
            $html.Add('      <h2>Branches</h2>')
            $html.Add("      <div class=""pct"">$('{0:N2}' -f [double]$coverage.summary.branches.pct)%</div>")
            $html.Add("      <div class=""count"">$([int]$coverage.summary.branches.covered) / $([int]$coverage.summary.branches.total)</div>")
            $html.Add('    </section>')
            $html.Add('    <section class="card">')
            $html.Add('      <h2>Lines</h2>')
            $html.Add("      <div class=""pct"">$('{0:N2}' -f [double]$coverage.summary.lines.pct)%</div>")
            $html.Add("      <div class=""count"">$([int]$coverage.summary.lines.covered) / $([int]$coverage.summary.lines.total)</div>")
            $html.Add('    </section>')
            $html.Add('  </div>')
            $html.Add('  <table>')
            $html.Add('    <thead>')
            $html.Add('      <tr>')
            $html.Add('        <th>File</th>')
            $html.Add('        <th>Functions</th>')
            $html.Add('        <th>Functions Count</th>')
            $html.Add('        <th>Branches</th>')
            $html.Add('        <th>Branches Count</th>')
            $html.Add('        <th>Lines</th>')
            $html.Add('        <th>Lines Count</th>')
            $html.Add('      </tr>')
            $html.Add('    </thead>')
            $html.Add('    <tbody>')
            foreach ($row in $rows) {
              $html.Add($row)
            }
            $html.Add('    </tbody>')
            $html.Add('  </table>')
            $html.Add('</body>')
            $html.Add('</html>')
            [System.IO.File]::WriteAllLines((Resolve-Path -LiteralPath $reportHtml), $html, [System.Text.UTF8Encoding]::new($false))
          } else {
            Write-Host 'coverageReport.json not found, skipping static report render.'
          }

      - name: Publish test summary
        if: always()
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $testResult = 'entry/.test/default/intermediates/test/coverage_data/test_result.txt'
          $coverageReport = 'entry/.test/default/outputs/test/reports/coverageReport.json'

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## entry@default Unit Test Summary'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''

          if (Test-Path -LiteralPath $testResult) {
            $resultText = (Get-Content -LiteralPath $testResult -Raw -Encoding utf8).Trim()
            $lines = Get-Content -LiteralPath $testResult -Encoding utf8
            $failedCases = New-Object System.Collections.Generic.List[string]
            $currentClass = ''
            $currentTest = ''
            foreach ($line in $lines) {
              if ($line.StartsWith('class=')) {
                $currentClass = $line.Substring(6)
                continue
              }
              if ($line.StartsWith('test=')) {
                $currentTest = $line.Substring(5)
                continue
              }
              if ($line -eq 'result=Failure' -or $line -eq 'result=Error') {
                $failedCases.Add("$currentClass :: $currentTest")
              }
            }

            if ($failedCases.Count -gt 0) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### Failed Cases'
              foreach ($failedCase in $failedCases) {
                Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- $failedCase"
              }
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
            } elseif ($resultText -match 'Failure:\s*0,\s*Error:\s*0') {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'All discovered unit tests passed.'
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
            }

            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $resultText
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'test_result.txt not found'
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''

          if (Test-Path -LiteralPath $coverageReport) {
            $coverage = Get-Content -LiteralPath $coverageReport -Raw -Encoding utf8 | ConvertFrom-Json
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Metric | Covered | Total | Rate |"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "|---|---:|---:|---:|"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Lines | $($coverage.lines.hit) | $($coverage.lines.found) | $($coverage.lines.pct)% |"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Functions | $($coverage.functions.hit) | $($coverage.functions.found) | $($coverage.functions.pct)% |"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Branches | $($coverage.branches.hit) | $($coverage.branches.found) | $($coverage.branches.pct)% |"
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'coverageReport.json not found'
          }

      - name: Check GitHub artifact upload connectivity
        if: always()
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference = 'Continue'
          $hosts = @(
            'api.github.com',
            'results-receiver.actions.githubusercontent.com'
          )
          foreach ($hostName in $hosts) {
            Write-Host "Checking HTTPS connectivity to $hostName..."
            Test-NetConnection -ComputerName $hostName -Port 443 -InformationLevel Detailed
          }
          Write-Host 'Artifact upload also requires outbound HTTPS access to *.blob.core.windows.net.'

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: entry-default-unit-test-report
          path: |
            entry/.test/default/intermediates/test/coverage_data/test_result.txt
            entry/.test/default/outputs/test/reports
          if-no-files-found: warn
          retention-days: 7

  harmonyos_build:
    name: Build entry@default HAP
    runs-on: [self-hosted, windows, harmonyos]
    needs: [checks, test_inventory, unit_test_entry_default]
    if: github.event_name == 'push' && vars.HARMONYOS_CI_ENABLED == 'true'

    steps:
      - name: Checkout code
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $repo = $env:GITHUB_REPOSITORY
          $sha = $env:GITHUB_SHA
          $zipPath = Join-Path $env:RUNNER_TEMP "source-$sha.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "source-$sha"
          Remove-Item -LiteralPath $zipPath -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $extractPath -Recurse -Force -ErrorAction SilentlyContinue

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            'User-Agent' = 'security-tool-ci'
            Accept = 'application/vnd.github+json'
          }
          Invoke-WebRequest -Uri "https://api.github.com/repos/$repo/zipball/$sha" -Headers $headers -OutFile $zipPath
          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractPath -Force
          $sourceRoot = Get-ChildItem -LiteralPath $extractPath -Directory | Select-Object -First 1
          if (-not $sourceRoot) {
            Write-Error 'Downloaded source archive is empty.'
          }

          function Remove-WorkspaceItem([System.IO.FileSystemInfo] $item) {
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              if (-not (Test-Path -LiteralPath $item.FullName)) {
                return
              }
              try {
                Remove-Item -LiteralPath $item.FullName -Recurse -Force -ErrorAction Stop
                return
              } catch [System.IO.DirectoryNotFoundException] {
                return
              } catch [System.IO.FileNotFoundException] {
                return
              } catch {
                if ($attempt -eq 3) {
                  Write-Warning "Workspace cleanup skipped stale item after retries: $($item.FullName) - $($_.Exception.Message)"
                  return
                }
                Start-Sleep -Milliseconds (200 * $attempt)
              }
            }
          }

          Get-ChildItem -LiteralPath (Get-Location) -Force |
            Where-Object { $_.Name -ne '.git' } |
            ForEach-Object { Remove-WorkspaceItem $_ }
          Get-ChildItem -LiteralPath $sourceRoot.FullName -Force |
            Copy-Item -Destination (Get-Location) -Recurse -Force

          Write-Host "Checked out $repo@$sha via GitHub archive."

      - name: Install dependencies
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          if (Test-Path -LiteralPath 'package.json') {
            npm install --prefer-offline
          } else {
            Write-Host 'package.json not found at repository root, skipping npm install.'
          }

      - name: Resolve local HarmonyOS toolchain
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $candidates = @()
          $javaCandidates = @()
          if ($env:DEVECOSTUDIO_HOME) {
            $candidates += (Join-Path $env:DEVECOSTUDIO_HOME 'tools\hvigor\bin\hvigorw.bat')
            $javaCandidates += (Join-Path $env:DEVECOSTUDIO_HOME 'jbr')
          }
          $candidates += 'C:\Program Files\Huawei\DevEco Studio\tools\hvigor\bin\hvigorw.bat'
          $javaCandidates += 'C:\Program Files\Huawei\DevEco Studio\jbr'
          $ohpmCandidates = @()
          $sdkCandidates = @()
          if ($env:DEVECOSTUDIO_HOME) {
            $ohpmCandidates += (Join-Path $env:DEVECOSTUDIO_HOME 'tools\ohpm\bin\ohpm.bat')
            $sdkCandidates += (Join-Path $env:DEVECOSTUDIO_HOME 'sdk')
          }
          $ohpmCandidates += 'C:\Program Files\Huawei\DevEco Studio\tools\ohpm\bin\ohpm.bat'
          $sdkCandidates += 'C:\Program Files\Huawei\DevEco Studio\sdk'

          $hvigorw = $null
          foreach ($candidate in $candidates) {
            if ($candidate -and (Test-Path -LiteralPath $candidate)) {
              $hvigorw = $candidate
              break
            }
          }
          if (-not $hvigorw) {
            Write-Error 'hvigorw.bat was not found.'
          }

          $nodeHome = if ($env:NODE_HOME -and (Test-Path -LiteralPath (Join-Path $env:NODE_HOME 'node.exe'))) {
            $env:NODE_HOME
          } else {
            $nodeCommand = Get-Command node -ErrorAction SilentlyContinue
            if ($nodeCommand) {
              Split-Path -Path $nodeCommand.Source -Parent
            } else {
              $null
            }
          }
          if (-not $nodeHome) {
            Write-Error 'Node.js was not found.'
          }

          $javaHome = $null
          foreach ($candidate in $javaCandidates) {
            if ($candidate -and (Test-Path -LiteralPath (Join-Path $candidate 'bin\java.exe'))) {
              $javaHome = $candidate
              break
            }
          }
          if (-not $javaHome -and $env:JAVA_HOME -and (Test-Path -LiteralPath (Join-Path $env:JAVA_HOME 'bin\java.exe'))) {
            $javaHome = $env:JAVA_HOME
          }
          if (-not $javaHome) {
            Write-Error 'Java runtime was not found.'
          }

          $ohpmPath = $null
          foreach ($candidate in $ohpmCandidates) {
            if ($candidate -and (Test-Path -LiteralPath $candidate)) {
              $ohpmPath = $candidate
              break
            }
          }
          if (-not $ohpmPath) {
            Write-Error 'ohpm.bat was not found.'
          }

          $devecoSdkHome = $null
          foreach ($candidate in $sdkCandidates) {
            if ($candidate -and (Test-Path -LiteralPath (Join-Path $candidate 'default\sdk-pkg.json'))) {
              $devecoSdkHome = $candidate
              break
            }
          }
          if (-not $devecoSdkHome) {
            Write-Error 'DevEco SDK was not found.'
          }

          $hvigorUserHome = Join-Path 'C:\hvigor-ci' ("user-home-" + $env:GITHUB_RUN_ID + '-' + $env:GITHUB_JOB + '-' + $env:GITHUB_RUN_ATTEMPT)
          New-Item -ItemType Directory -Path $hvigorUserHome -Force | Out-Null
          $npmCache = Join-Path $hvigorUserHome 'npm-cache'
          $pnpmHome = Join-Path $hvigorUserHome 'pnpm-home'
          New-Item -ItemType Directory -Path $npmCache -Force | Out-Null
          New-Item -ItemType Directory -Path $pnpmHome -Force | Out-Null
          if ($hvigorUserHome -match '\s') {
            Write-Error "HVIGOR_USER_HOME must not contain spaces: $hvigorUserHome"
          }

          $realDevecoSdkHome = $devecoSdkHome
          $sdkOverlayHome = Join-Path 'C:\hvigor-ci' ("sdk-overlay-" + $env:GITHUB_RUN_ID + '-' + $env:GITHUB_JOB + '-' + $env:GITHUB_RUN_ATTEMPT)
          $overlayDefault = Join-Path $sdkOverlayHome 'default'
          $overlayOpenHarmony = Join-Path $overlayDefault 'openharmony'
          $realDefault = Join-Path $realDevecoSdkHome 'default'
          $realOpenHarmony = Join-Path $realDefault 'openharmony'
          Remove-Item -LiteralPath $sdkOverlayHome -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $overlayDefault -Force | Out-Null
          Copy-Item -LiteralPath (Join-Path $realDefault 'sdk-pkg.json') -Destination (Join-Path $overlayDefault 'sdk-pkg.json') -Force

          Get-ChildItem -LiteralPath $realDefault -Force | Where-Object { $_.Name -ne 'openharmony' -and $_.Name -ne 'sdk-pkg.json' } | ForEach-Object {
            $target = Join-Path $overlayDefault $_.Name
            if ($_.PSIsContainer) {
              New-Item -ItemType Junction -Path $target -Target $_.FullName | Out-Null
            } else {
              Copy-Item -LiteralPath $_.FullName -Destination $target -Force
            }
          }

          New-Item -ItemType Directory -Path $overlayOpenHarmony -Force | Out-Null
          Get-ChildItem -LiteralPath $realOpenHarmony -Force | Where-Object { $_.Name -ne 'previewer' } | ForEach-Object {
            $target = Join-Path $overlayOpenHarmony $_.Name
            if ($_.PSIsContainer) {
              New-Item -ItemType Junction -Path $target -Target $_.FullName | Out-Null
            } else {
              Copy-Item -LiteralPath $_.FullName -Destination $target -Force
            }
          }

          $realPreviewer = Join-Path $realOpenHarmony 'previewer'
          $overlayPreviewer = Join-Path $overlayOpenHarmony 'previewer'
          New-Item -ItemType Directory -Path $overlayPreviewer -Force | Out-Null
          Get-ChildItem -LiteralPath $realPreviewer -Force | Where-Object { $_.Name -ne 'common' } | ForEach-Object {
            $target = Join-Path $overlayPreviewer $_.Name
            if ($_.PSIsContainer) {
              New-Item -ItemType Junction -Path $target -Target $_.FullName | Out-Null
            } else {
              Copy-Item -LiteralPath $_.FullName -Destination $target -Force
            }
          }

          $realCommon = Join-Path $realPreviewer 'common'
          $overlayCommon = Join-Path $overlayPreviewer 'common'
          New-Item -ItemType Directory -Path $overlayCommon -Force | Out-Null
          Get-ChildItem -LiteralPath $realCommon -Force | Where-Object { $_.Name -ne 'resources' } | ForEach-Object {
            $target = Join-Path $overlayCommon $_.Name
            if ($_.PSIsContainer) {
              New-Item -ItemType Junction -Path $target -Target $_.FullName | Out-Null
            } else {
              Copy-Item -LiteralPath $_.FullName -Destination $target -Force
            }
          }

          $realResources = Join-Path $realCommon 'resources'
          $overlayResources = Join-Path $overlayCommon 'resources'
          New-Item -ItemType Directory -Path $overlayResources -Force | Out-Null
          Get-ChildItem -LiteralPath $realResources -Force | Where-Object { $_.Name -ne 'module.json' } | ForEach-Object {
            $target = Join-Path $overlayResources $_.Name
            if ($_.PSIsContainer) {
              New-Item -ItemType Junction -Path $target -Target $_.FullName | Out-Null
            } else {
              Copy-Item -LiteralPath $_.FullName -Destination $target -Force
            }
          }
          Copy-Item -LiteralPath '.github\ci\openharmony-previewer-module.json' -Destination (Join-Path $overlayResources 'module.json') -Force
          node -e "const fs=require('fs'); JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log('SDK overlay module.json valid')" (Join-Path $overlayResources 'module.json')
          $devecoSdkHome = $sdkOverlayHome

          function New-NoSpaceToolLink([string] $name, [string] $targetPath) {
            if ($targetPath -notmatch '\s') {
              return $targetPath
            }
            $linkRoot = Join-Path 'C:\hvigor-ci\tool-links' ($env:GITHUB_RUN_ID + '-' + $env:GITHUB_JOB + '-' + $env:GITHUB_RUN_ATTEMPT)
            New-Item -ItemType Directory -Path $linkRoot -Force | Out-Null
            $linkPath = Join-Path $linkRoot $name
            if (Test-Path -LiteralPath $linkPath) {
              Remove-Item -LiteralPath $linkPath -Force
            }
            New-Item -ItemType Junction -Path $linkPath -Target $targetPath | Out-Null
            return $linkPath
          }

          $nodeHome = New-NoSpaceToolLink -name 'node' -targetPath $nodeHome
          $javaHome = New-NoSpaceToolLink -name 'jbr' -targetPath $javaHome
          if ($nodeHome -match '\s') {
            Write-Error "NODE_HOME must not contain spaces for hvigor pnpm bootstrap: $nodeHome"
          }
          if ($javaHome -match '\s') {
            Write-Error "JAVA_HOME must not contain spaces for hvigor: $javaHome"
          }

          "HVIGORW_PATH=$hvigorw" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NODE_HOME=$nodeHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OHPM_PATH=$ohpmPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "JAVA_HOME=$javaHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "REAL_DEVECO_SDK_HOME=$realDevecoSdkHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "DEVECO_SDK_HOME=$devecoSdkHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HVIGOR_USER_HOME=$hvigorUserHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NPM_CONFIG_CACHE=$npmCache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NPM_CONFIG_PREFIX=$pnpmHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PNPM_HOME=$pnpmHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$nodeHome" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$pnpmHome" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$javaHome\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Using hvigorw: $hvigorw"
          Write-Host "Using NODE_HOME: $nodeHome"
          Write-Host "Using ohpm: $ohpmPath"
          Write-Host "Using JAVA_HOME: $javaHome"
          Write-Host "Using REAL_DEVECO_SDK_HOME: $realDevecoSdkHome"
          Write-Host "Using DEVECO_SDK_HOME: $devecoSdkHome"
          Write-Host "Using HVIGOR_USER_HOME: $hvigorUserHome"
          Write-Host "Using NPM_CONFIG_CACHE: $npmCache"
          Write-Host "Using NPM_CONFIG_PREFIX: $pnpmHome"
          Write-Host "Using PNPM_HOME: $pnpmHome"

      - name: Install pnpm for hvigor
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $env:PATH = "$env:NODE_HOME;$env:PNPM_HOME;$env:JAVA_HOME\bin;$env:PATH"
          $npm = Join-Path $env:NODE_HOME 'npm.cmd'
          if (-not (Test-Path -LiteralPath $npm)) {
            Write-Error "npm.cmd was not found under NODE_HOME: $npm"
          }
          & $npm --version
          $wrapperTools = Join-Path $env:HVIGOR_USER_HOME 'wrapper\tools'
          New-Item -ItemType Directory -Path $wrapperTools -Force | Out-Null
          & $npm install --prefix "$wrapperTools" "pnpm@10.27.0"
          $pnpm = Join-Path $wrapperTools 'node_modules\.bin\pnpm.cmd'
          if (-not (Test-Path -LiteralPath $pnpm)) {
            Write-Error "pnpm.cmd was not installed under hvigor wrapper tools: $pnpm"
          }
          & $pnpm --version

      - name: Install Harmony dependencies
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          if (Test-Path -LiteralPath 'oh-package.json5') {
            & "$env:OHPM_PATH" install
          } else {
            Write-Host 'oh-package.json5 not found, skipping ohpm install.'
          }

      - name: Build unsigned HAP
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $realRestool = Join-Path $env:REAL_DEVECO_SDK_HOME 'default\openharmony\toolchains\restool.exe'
          $overlayRestool = Join-Path $env:DEVECO_SDK_HOME 'default\openharmony\toolchains\restool.exe'
          foreach ($tool in @(@{ Name = 'real'; Path = $realRestool }, @{ Name = 'overlay'; Path = $overlayRestool })) {
            Write-Host "Checking $($tool.Name) restool: $($tool.Path)"
            if (-not (Test-Path -LiteralPath $tool.Path)) {
              Write-Error "restool.exe missing at $($tool.Path)"
            }
            icacls $tool.Path
            try {
              & $tool.Path 2>&1 | Select-Object -First 5 | ForEach-Object { Write-Host $_ }
            } catch {
              Write-Error "restool.exe could not be executed from $($tool.Path): $($_.Exception.Message)"
            }
          }
          & "$env:HVIGORW_PATH" --no-daemon assembleHap --mode module -p product=default -p module=entry@default

      - name: Sync HAP into signer workspace
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          Copy-Item -LiteralPath 'entry/build/default/outputs/default/entry-default-unsigned.hap' -Destination 'hapsigner/entry-default-unsigned.hap' -Force

      - name: Sign HAP
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          Push-Location 'hapsigner'
          try {
            & "$env:JAVA_HOME\bin\java.exe" -jar 'hap-sign-tool.jar' sign-app `
              -keyAlias 'openharmony application release' `
              -signAlg 'SHA256withECDSA' `
              -mode 'localSign' `
              -appCertFile 'OpenHarmonyApplication.pem' `
              -profileFile 'ohos_provision_debug.p7b' `
              -inFile 'entry-default-unsigned.hap' `
              -keystoreFile 'OpenHarmony.p12' `
              -outFile 'signApp.hap' `
              -keyPwd '123456' `
              -keystorePwd '123456'
          } finally {
            Pop-Location
          }

      - name: Check GitHub artifact upload connectivity
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference = 'Continue'
          $hosts = @(
            'api.github.com',
            'results-receiver.actions.githubusercontent.com'
          )
          foreach ($hostName in $hosts) {
            Write-Host "Checking HTTPS connectivity to $hostName..."
            Test-NetConnection -ComputerName $hostName -Port 443 -InformationLevel Detailed
          }
          Write-Host 'Artifact upload also requires outbound HTTPS access to *.blob.core.windows.net.'

      - name: Upload HAP artifacts
        uses: actions/upload-artifact@v6
        with:
          name: entry-default-hap
          path: |
            entry/build/default/outputs/default/entry-default-unsigned.hap
            hapsigner/signApp.hap
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

      - name: Publish build summary
        if: always()
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $unsignedHap = 'entry/build/default/outputs/default/entry-default-unsigned.hap'
          $signedHap = 'hapsigner/signApp.hap'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## entry@default HAP Build Summary'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''

          if (Test-Path -LiteralPath $unsignedHap) {
            $file = Get-Item -LiteralPath $unsignedHap
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Unsigned HAP: `"$($file.Name)`" ($([math]::Round($file.Length / 1MB, 2)) MB)"
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Unsigned HAP: missing'
          }

          if (Test-Path -LiteralPath $signedHap) {
            $file = Get-Item -LiteralPath $signedHap
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Signed HAP: `"$($file.Name)`" ($([math]::Round($file.Length / 1MB, 2)) MB)"
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Signed HAP: missing'
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''

          if (-not (Test-Path -LiteralPath $unsignedHap) -or -not (Test-Path -LiteralPath $signedHap)) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'Build or signing failed before artifacts were fully produced.'
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'Build and signing completed successfully.'
          }

  # Example self-hosted implementation reference:
  #
  # harmonyos_build:
  #   name: HarmonyOS Build And Sign

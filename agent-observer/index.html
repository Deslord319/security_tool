<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Observer</title>
  <style>
    :root {
      --bg: #f6f2eb;
      --card: rgba(255, 252, 247, 0.96);
      --line: #ded3c6;
      --ink: #1f2933;
      --muted: #667281;
      --brand: #0f766e;
      --brand-soft: #d7f1ed;
      --ok: #067647;
      --ok-soft: #d9f7e8;
      --warn: #9a6700;
      --warn-soft: #fff0c7;
      --danger: #b42318;
      --danger-soft: #fde2df;
      --shadow: 0 16px 34px rgba(60, 45, 22, 0.08);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #fae4cf 0, transparent 26%),
        radial-gradient(circle at top right, #dcefeb 0, transparent 20%),
        linear-gradient(180deg, #fbf8f3 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    .app {
      max-width: 1680px;
      margin: 0 auto;
      padding: 18px;
    }

    .panel,
    .metric-card,
    .run,
    .event,
    .detail-card,
    .artifact-card {
      background: var(--card);
      border: 1px solid rgba(160, 131, 92, 0.22);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .metric-card { padding: 16px 18px; }
    .metric-label, .metric-note, .sub, .muted, .note, .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .metric-value {
      margin-top: 6px;
      font-size: 28px;
      line-height: 1;
      font-weight: 700;
      color: var(--ink);
    }

    .layout {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr) 460px;
      gap: 14px;
      align-items: start;
    }

    .panel { padding: 16px; }

    .panel-scroll {
      max-height: calc(100vh - 64px);
      overflow: auto;
      position: sticky;
      top: 18px;
    }

    .head,
    .pane-head,
    .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .head { margin-bottom: 10px; }
    .head h2, .head h3, .section-title, .title { margin: 0; }

    .toolbar {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .toolbar-row {
      display: grid;
      gap: 8px;
    }

    .toolbar-row.dual {
      grid-template-columns: 1fr 1fr;
    }

    .field-input,
    .field-select {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.84);
      color: var(--ink);
      font-size: 13px;
      padding: 0 12px;
      outline: none;
    }

    .field-input:focus,
    .field-select:focus {
      border-color: rgba(15, 118, 110, 0.52);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.08);
    }

    .list,
    .timeline,
    .stack {
      display: grid;
      gap: 10px;
    }

    .scroll-area {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 320px);
      overflow: auto;
      padding-right: 4px;
      align-content: start;
    }

    .scroll-area::-webkit-scrollbar,
    .panel-scroll::-webkit-scrollbar {
      width: 10px;
    }

    .scroll-area::-webkit-scrollbar-thumb,
    .panel-scroll::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(105, 91, 75, 0.22);
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .run,
    .event,
    .detail-card,
    .artifact-card {
      padding: 13px;
    }

    .run,
    .event {
      cursor: pointer;
      transition: transform .14s ease, border-color .14s ease;
    }

    .run:hover,
    .event:hover {
      transform: translateY(-2px);
      border-color: rgba(180, 83, 9, 0.44);
    }

    .active {
      border-color: rgba(15, 118, 110, 0.62);
      background: linear-gradient(180deg, #fffdf9 0%, #f1faf7 100%);
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.45;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    .chip.brand { background: var(--brand-soft); color: var(--brand); }
    .chip.ok { background: var(--ok-soft); color: var(--ok); }
    .chip.warn { background: var(--warn-soft); color: var(--warn); }
    .chip.danger { background: var(--danger-soft); color: var(--danger); }
    .chip.neutral { background: #efe8de; color: #695b4b; }

    .overview-card {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(160, 131, 92, 0.18);
    }

    .kv {
      display: grid;
      grid-template-columns: 108px 1fr;
      gap: 8px 10px;
      font-size: 13px;
    }

    .kv strong {
      color: var(--muted);
      font-weight: 600;
    }

    .detail-card h4 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .detail-card ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .detail-card li {
      line-height: 1.7;
      font-size: 13px;
    }

    .empty-state {
      padding: 24px 18px;
      border-radius: 18px;
      border: 1px dashed var(--line);
      background: rgba(255, 255, 255, 0.55);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }

    .pagination-info {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .pagination-actions {
      display: flex;
      gap: 8px;
    }

    .page-btn {
      height: 36px;
      min-width: 88px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.84);
      color: var(--ink);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .page-btn:disabled {
      opacity: 0.48;
      cursor: default;
    }

    .artifact-card { overflow: hidden; }
    .artifact-meta { margin-top: 10px; }

    .mock-screen,
    .mock-diff,
    .mock-doc,
    .mock-tree {
      border-radius: 18px;
      border: 1px solid var(--line);
      overflow: hidden;
      background: #ffffff;
    }

    .phone {
      background: #111827;
      padding: 8px;
      border-radius: 22px;
    }

    .screen {
      background: #f9fbfc;
      border-radius: 14px;
      min-height: 220px;
      overflow: hidden;
      display: grid;
      grid-template-rows: 34px 1fr;
    }

    .topbar {
      background: linear-gradient(90deg, #0f766e, #125471);
      color: #f4f8fb;
      font-size: 12px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .content {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .block {
      border-radius: 12px;
      background: #ffffff;
      border: 1px solid #e6edf2;
      padding: 10px;
    }

    .field {
      height: 10px;
      border-radius: 999px;
      background: #e5edf3;
      margin-top: 8px;
    }

    .field.short { width: 48%; }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .btn {
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 12px;
      border: 0;
      white-space: nowrap;
    }

    .btn.primary { background: #0f766e; color: #fff; }
    .btn.secondary { background: #e6f1ff; color: #125471; }
    .btn.warning { background: #fff0c7; color: #9a6700; }

    .toast {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 12px;
      white-space: nowrap;
    }

    .toast.fail { background: #fde7e4; color: #b42318; }
    .toast.ok { background: #dcfce7; color: #067647; }

    .mock-diff {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .mock-diff .half {
      padding: 10px;
      background: #fff;
      border-right: 1px solid var(--line);
    }

    .mock-diff .half:last-child {
      border-right: 0;
    }

    .mock-diff .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .mock-diff .screen-min {
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e6edf2;
      min-height: 148px;
      padding: 10px;
    }

    .mock-doc,
    .mock-tree {
      padding: 12px;
      font: 12px/1.7 Consolas, "Courier New", monospace;
      white-space: pre-wrap;
      color: #28333f;
    }

    @media (max-width: 1320px) {
      .layout {
        grid-template-columns: 300px minmax(0, 1fr);
      }

      .panel-scroll {
        grid-column: 1 / -1;
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 960px) {
      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .scroll-area {
        max-height: none;
      }
    }

    @media (max-width: 640px) {
      .app { padding: 14px; }
      .metrics { grid-template-columns: 1fr; }
      .toolbar-row.dual { grid-template-columns: 1fr; }
      .pagination { flex-direction: column; align-items: stretch; }
      .pagination-actions { width: 100%; }
      .page-btn { flex: 1; }
      .button-row { flex-wrap: wrap; }
      .btn { min-width: 0; }
      .metric-value { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="metrics">
      <article class="metric-card">
        <div class="metric-label">运行次数</div>
        <div class="metric-value" id="metricRuns">0</div>
        <div class="metric-note">按当前左侧搜索与筛选结果统计</div>
      </article>
      <article class="metric-card">
        <div class="metric-label">事件数</div>
        <div class="metric-value" id="metricEvents">0</div>
        <div class="metric-note">统计筛选结果内全部执行事件</div>
      </article>
      <article class="metric-card">
        <div class="metric-label">证据数</div>
        <div class="metric-value" id="metricArtifacts">0</div>
        <div class="metric-note">截图、对比图、日志与补丁摘要</div>
      </article>
      <article class="metric-card">
        <div class="metric-label">有效率</div>
        <div class="metric-value" id="metricValidity">0%</div>
        <div class="metric-note">按已复核事件计算有效占比</div>
      </article>
    </section>

    <section class="layout">
      <aside class="panel">
        <div class="head">
          <div>
            <h2>运行记录</h2>
          </div>
          <span class="chip brand" id="runCount"></span>
        </div>

        <div class="toolbar">
          <div class="toolbar-row">
            <input class="field-input" id="runSearch" type="text" placeholder="搜索运行标题">
          </div>
          <div class="toolbar-row dual">
            <select class="field-select" id="statusFilter">
              <option value="all">全部状态</option>
              <option value="verified">已验证</option>
              <option value="in_progress">进行中</option>
              <option value="blocked">阻塞</option>
              <option value="awaiting_feedback">等待反馈</option>
            </select>
            <select class="field-select" id="timeFilter">
              <option value="all">全部时间</option>
              <option value="24h">最近 24 小时</option>
              <option value="7d">最近 7 天</option>
              <option value="30d">最近 30 天</option>
            </select>
          </div>
        </div>

        <div class="list scroll-area" id="runList"></div>

        <div class="pagination">
          <div class="pagination-info" id="pageInfo"></div>
          <div class="pagination-actions">
            <button class="page-btn" id="prevPage">上一页</button>
            <button class="page-btn" id="nextPage">下一页</button>
          </div>
        </div>
      </aside>

      <main class="panel">
        <div class="head">
          <div>
            <h2 id="runTitle"></h2>
            <div class="sub" id="runSummary"></div>
          </div>
          <div class="chips" id="runChips"></div>
        </div>

        <div class="overview-card">
          <div class="kv" id="overview"></div>
        </div>

        <div class="pane-head" style="margin-top:14px;">
          <div class="section-title">执行时间线</div>
          <span class="chip neutral" id="eventCount"></span>
        </div>

        <div class="timeline scroll-area" id="timeline"></div>
      </main>

      <aside class="panel panel-scroll">
        <div class="head">
          <div>
            <h3>事件详情</h3>
            <div class="sub">展示当前步骤的输入、输出、关键信息和关联证据。</div>
          </div>
          <span class="chip neutral" id="targetChip">未选择</span>
        </div>

        <div id="detailContent">
          <div class="empty-state">
            请选择一条执行事件查看详情。
          </div>
        </div>
      </aside>
    </section>
  </div>

      const [cls, text] = map[status] || ["neutral", status];
      return `<span class="chip ${cls}">${text}</span>`;

        let matchTime = true;
        if (runTimeFilter !== "all") {
          const createdAt = parseRunDate(run.createdAt);
          const diff = now - createdAt;
          const rangeMap = {
            "24h": 24 * 60 * 60 * 1000,
            "7d": 7 * 24 * 60 * 60 * 1000,
            "30d": 30 * 24 * 60 * 60 * 1000
          };
          matchTime = diff <= rangeMap[runTimeFilter];
        }

        return matchQuery && matchStatus && matchTime;
      });

        <div class="stack">
          <section class="detail-card">
            <h4>这一步收到了什么</h4>
            <div class="note">${selectedEvent.inputSummary}</div>
          </section>

          <section class="detail-card">
            <h4>这一步产出了什么</h4>
            <div class="note">${selectedEvent.outputSummary}</div>
          </section>

          <section class="detail-card">
            <h4>关键信息</h4>
            <ul>
              ${selectedEvent.keyPoints.map(item => `<li>${item}</li>`).join("")}
            </ul>
          </section>

          <section class="stack">
            ${relatedArtifacts || `
              <div class="detail-card">
                <h4>关联证据</h4>
                <div class="note">当前步骤没有挂接可视化证据。</div>
              </div>
            `}
          </section>
        </div>
      `;
    }

    function bind() {
      document.querySelectorAll("[data-run]").forEach(node => {
        node.onclick = () => {
          const nextRun = runs.find(run => run.id === node.dataset.run);
          if (!nextRun) return;
          selectedRun = nextRun;
          selectedEvent = null;
          renderRuns();
          renderRunDetail();
          renderInspector();
          bind();
        };
      });

      const runSearch = document.getElementById("runSearch");
      runSearch.value = runSearchQuery;
      runSearch.oninput = e => {
        runSearchQuery = e.target.value.trim();
        currentPage = 1;
        renderMetrics();
        renderRuns();
        bind();
      };

      const statusFilter = document.getElementById("statusFilter");
      statusFilter.value = runStatusFilter;
      statusFilter.onchange = e => {
        runStatusFilter = e.target.value;
        currentPage = 1;
        renderMetrics();
        renderRuns();
        bind();
      };

      const timeFilter = document.getElementById("timeFilter");
      timeFilter.value = runTimeFilter;
      timeFilter.onchange = e => {
        runTimeFilter = e.target.value;
        currentPage = 1;
        renderMetrics();
        renderRuns();
        bind();
      };

      document.getElementById("prevPage").onclick = () => {
        if (currentPage > 1) {
          currentPage -= 1;
          renderRuns();
          bind();
        }
      };

      document.getElementById("nextPage").onclick = () => {
        const totalPages = Math.max(1, Math.ceil(getFilteredRuns().length / pageSize));
        if (currentPage < totalPages) {
          currentPage += 1;
          renderRuns();
          bind();
        }
      };

      document.querySelectorAll("[data-event]").forEach(node => {
        node.onclick = () => {
          selectedEvent = selectedRun.events.find(event => event.id === node.dataset.event) || null;
          renderRunDetail();
          renderInspector();
          bind();
        };
      });
    }

    function render() {
      renderMetrics();
      renderRuns();
      renderRunDetail();
      renderInspector();
      bind();
    }

    render();
  </script>
</body>
</html>

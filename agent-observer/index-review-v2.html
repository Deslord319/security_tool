<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Observer</title>
  <style>
    :root{--bg:#f7f3ee;--panel:rgba(255,253,249,.96);--line:rgba(150,118,77,.18);--text:#1b2530;--muted:#6a7684;--brand:#0f766e;--brand-soft:#daf3ee;--ok:#067647;--ok-soft:#daf6e5;--warn:#9a6700;--warn-soft:#fff0c7;--danger:#b42318;--danger-soft:#fde2df;--neutral-soft:#efe7de;--shadow:0 16px 32px rgba(38,36,31,.08);--radius:22px}
    *{box-sizing:border-box}body{margin:0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at top left,#f8dfc4 0,transparent 20%),radial-gradient(circle at top right,#dff1eb 0,transparent 16%),linear-gradient(180deg,#fcfaf6 0%,var(--bg) 100%)}
    .app{width:min(96vw,1880px);margin:0 auto;padding:18px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.topbar,.panel-head,.row,.viewer-head,.artifact-head,.pagination{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.topbar{margin-bottom:16px}.title h1{margin:0;font-size:30px;line-height:1.15}.title p{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.7;max-width:760px}
    .btn,.field-input,.field-select,.action-btn,.artifact-link{height:40px;border:1px solid rgba(150,118,77,.2);border-radius:12px;background:rgba(255,255,255,.96);color:var(--text);font-size:13px;padding:0 12px;text-decoration:none}.btn,.action-btn,.artifact-thumb{cursor:pointer}.btn:disabled,.action-btn:disabled{opacity:.5;cursor:default}
    .metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}.metric{padding:16px 18px}.metric .label,.meta,.sub,.detail-field-label{color:var(--muted);font-size:12px;line-height:1.7}.metric .value{margin-top:8px;font-size:28px;font-weight:800;line-height:1.1}
    .layout{display:grid;grid-template-columns:380px minmax(0,1fr) 520px;gap:16px;align-items:start}.panel{padding:16px;min-width:0}.panel-head h2,.panel-head h3{margin:0;font-size:22px;line-height:1.2}.toolbar{display:grid;gap:10px;margin:14px 0}.dual{display:grid;grid-template-columns:1fr 1fr;gap:8px}.scroll-stack,.detail-scroll{display:grid;gap:12px;align-content:start;overflow:auto;padding-right:4px}.scroll-stack{max-height:calc(100vh - 320px)}.detail-panel{display:flex;flex-direction:column;min-height:0;height:calc(100vh - 188px)}.detail-scroll{flex:1;min-height:0;overscroll-behavior:contain}
    .scroll-stack::-webkit-scrollbar,.detail-scroll::-webkit-scrollbar{width:10px}.scroll-stack::-webkit-scrollbar-thumb,.detail-scroll::-webkit-scrollbar-thumb{border-radius:999px;background:rgba(105,91,75,.22);border:2px solid transparent;background-clip:padding-box}
    .chip{display:inline-flex;align-items:center;justify-content:center;padding:7px 11px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap}.chip.brand{background:var(--brand-soft);color:var(--brand)}.chip.ok{background:var(--ok-soft);color:var(--ok)}.chip.warn{background:var(--warn-soft);color:var(--warn)}.chip.danger{background:var(--danger-soft);color:var(--danger)}.chip.neutral{background:var(--neutral-soft);color:#68594d}
    .run-card,.event-card,.focus-card,.detail-hero,.detail-card,.artifact-card{border:1px solid rgba(150,118,77,.18);border-radius:20px;background:rgba(255,255,255,.95);box-shadow:var(--shadow);min-width:0}.run-card,.event-card{padding:14px;cursor:pointer;transition:transform .14s ease,border-color .14s ease}.run-card:hover,.event-card:hover{transform:translateY(-2px);border-color:rgba(15,118,110,.34)}.run-card.active,.event-card.active,.focus-card,.detail-hero{background:linear-gradient(180deg,#fffefb 0%,#eef8f5 100%);border-color:rgba(15,118,110,.4)}
    .focus-card,.detail-hero,.detail-card,.artifact-card{padding:14px}.focus-card{margin-bottom:14px}.focus-title,.timeline-title,.title-sm{font-weight:800;line-height:1.4}.focus-title{margin:10px 0 0;font-size:24px}.title-sm{font-size:16px}.timeline-title{font-size:15px}.desc,.detail-copy,.detail-field-value,.artifact-fallback{color:#445364;font-size:13px;line-height:1.8;word-break:break-word}.signals,.timeline-meta,.event-meta,.detail-actions,.artifact-links{display:flex;flex-wrap:wrap;gap:8px}.signals{margin-top:10px}.signal{padding:6px 10px;border-radius:999px;font-size:12px;color:#576576;background:rgba(255,255,255,.94);border:1px solid rgba(150,118,77,.14)}
    .focus-stats,.detail-summary{display:grid;gap:8px}.focus-stats{grid-template-columns:repeat(4,minmax(0,1fr));margin-top:14px}.focus-stat,.summary-block{padding:10px 12px;border-radius:16px;background:rgba(255,255,255,.84);border:1px solid rgba(150,118,77,.14)}.focus-stat .label{color:var(--muted);font-size:12px}.focus-stat .value,.summary-block .value{margin-top:4px;font-size:13px;font-weight:700;line-height:1.6;word-break:break-word}.detail-summary{grid-template-columns:repeat(2,minmax(0,1fr));margin-top:12px}.summary-block.full{grid-column:1/-1}
    .step{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 7px;border-radius:999px;background:rgba(15,118,110,.12);color:var(--brand);font-weight:700}.timeline-main{min-width:0;display:grid;gap:6px}.timeline-trailing{display:grid;justify-items:end;gap:8px;flex-shrink:0}.timeline-count{font-size:12px;color:var(--muted);white-space:nowrap}
    .detail-card h4{margin:0 0 10px;font-size:15px}.detail-table{display:grid;grid-template-columns:92px minmax(0,1fr);gap:10px 12px;font-size:13px;color:#445364}.detail-table strong{color:var(--muted);font-weight:600}.detail-card ul,.detail-field-list{margin:0;padding-left:18px;color:#445364;font-size:13px;line-height:1.8}.detail-fields,.artifact-grid{display:grid;gap:12px}.detail-field-label{font-weight:700;letter-spacing:.02em}.detail-path-list{display:flex;flex-direction:column;gap:8px;margin-top:6px}.detail-path-item,.detail-pre{display:block;padding:8px 10px;border-radius:12px;border:1px solid rgba(150,118,77,.16);background:rgba(255,255,255,.92);font-family:Consolas,"SFMono-Regular",monospace;font-size:12px;line-height:1.7;color:#445364;word-break:break-all}.detail-pre{margin:0;white-space:pre-wrap}.detail-fallback{padding-top:4px;border-top:1px dashed rgba(150,118,77,.26)}
    .artifact-thumb{width:100%;padding:0;border:1px solid rgba(150,118,77,.16);border-radius:14px;overflow:hidden;background:#fff}.artifact-image{display:block;width:100%;max-height:220px;object-fit:contain;background:#fff}.artifact-body{margin-top:10px}.artifact-fallback{padding:10px 12px;border-radius:14px;border:1px dashed rgba(150,118,77,.26);background:rgba(255,255,255,.7)}
    .empty,.error{padding:22px 18px;border-radius:18px;font-size:13px;line-height:1.8}.empty{border:1px dashed #bca892;background:rgba(255,255,255,.62);color:var(--muted)}.error{border:1px solid rgba(180,35,24,.2);background:#fff2ef;color:var(--danger)}.pagination-actions,.viewer-actions{display:flex;gap:8px}
    .viewer{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(16,24,40,.72);z-index:999}.viewer.open{display:flex}.viewer-card{width:min(1120px,100%);max-height:100%;display:grid;grid-template-rows:auto minmax(0,1fr);gap:12px;padding:16px;border-radius:24px;background:rgba(255,252,247,.98);box-shadow:var(--shadow)}.viewer-stage{display:flex;align-items:center;justify-content:center;min-height:320px;overflow:auto;border-radius:18px;background:rgba(15,23,42,.06);border:1px solid rgba(150,118,77,.14)}.viewer-stage img{max-width:100%;max-height:72vh;object-fit:contain;background:#fff}
    @media (min-width:1920px){.app{width:min(95vw,1960px)}.layout{grid-template-columns:400px minmax(0,1fr) 540px;gap:18px}}
    @media (max-width:1680px){.app{width:min(97vw,1720px)}.layout{grid-template-columns:360px minmax(0,1fr) 500px}}
    @media (max-width:1440px){.app{width:min(98vw,1460px);padding:16px}.layout{grid-template-columns:320px minmax(0,1fr) 460px}.focus-stats,.detail-summary{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:1280px){.app{width:min(100vw,1280px);padding:14px}.metrics,.layout,.focus-stats,.detail-summary,.dual,.detail-table{grid-template-columns:1fr}.detail-panel{height:auto}.scroll-stack,.detail-scroll{max-height:none}}
    @media (max-width:720px){.app{padding:12px}.topbar,.panel-head,.row,.viewer-head,.artifact-head,.pagination{flex-direction:column}.timeline-trailing{width:100%;justify-items:start}.viewer{padding:12px}}
  </style>
</head>
<body>
  <div class="app">
    <section class="topbar">
      <div class="title">
        <h1>Agent Observer</h1>
        <p>面向多角色协作任务的可视化观察台，用于统一查看运行记录、执行事件线、审查结论与关联证据。</p>
      </div>
      <button class="btn" id="reloadBtn" type="button">刷新数据</button>
    </section>
    <section class="metrics">
      <article class="metric card"><div class="label">运行次数</div><div class="value" id="metricRuns">0</div></article>
      <article class="metric card"><div class="label">事件数</div><div class="value" id="metricEvents">0</div></article>
      <article class="metric card"><div class="label">证据数</div><div class="value" id="metricArtifacts">0</div></article>
      <article class="metric card"><div class="label">有效率</div><div class="value" id="metricValidity">0%</div></article>
    </section>
    <section class="layout">
      <aside class="panel card">
        <div class="panel-head"><div><h2>运行记录</h2><div class="sub">按任务查看运行记录，筛选后默认聚焦最新一条可展示 run。</div></div><span class="chip brand" id="runCount">0 条</span></div>
        <div class="toolbar">
          <input class="field-input" id="runSearch" type="text" placeholder="搜索任务标题或目标">
          <div class="dual">
            <select class="field-select" id="statusFilter"><option value="all">全部状态</option><option value="in_progress">进行中</option><option value="awaiting_feedback">待反馈</option><option value="completed">已完成</option><option value="failed">失败</option><option value="verified">已验证</option><option value="partial">部分有效</option><option value="blocked">阻塞</option></select>
            <select class="field-select" id="timeFilter"><option value="all">全部时间</option><option value="24h">24 小时内</option><option value="7d">7 天内</option><option value="30d">30 天内</option></select>
          </div>
        </div>
        <div class="scroll-stack" id="runList"></div>
        <div class="pagination"><div class="meta" id="pageInfo">暂无记录</div><div class="pagination-actions"><button class="btn" id="prevPage" type="button">上一页</button><button class="btn" id="nextPage" type="button">下一页</button></div></div>
      </aside>
      <main class="panel card">
        <article class="focus-card"><div class="focus-top"><div><div class="signals" id="runChips"></div><div class="focus-title" id="runTitle">暂无可展示运行</div><div class="desc" id="runSummary">请先运行 recorder 并生成 run 数据。</div><div class="signals" id="focusSignals"></div></div></div><div class="focus-stats" id="focusStats"></div><div class="detail-table" id="overview"></div></article>
        <div class="panel-head"><div><h3>执行事件线</h3><div class="sub">按步骤查看运行过程，重点关注当前状态、摘要和关联证据数量。</div></div><span class="chip neutral" id="eventCount">0 个步骤</span></div>
        <div class="scroll-stack" id="timeline"></div>
      </main>
      <aside class="panel card detail-panel">
        <div class="panel-head"><div><h3>事件详情</h3><div class="sub">点击中间事件后，在右侧查看结论、详细数据和关联证据。</div></div><span class="chip neutral" id="targetChip">未选择</span></div>
        <div class="detail-scroll" id="detailContent"></div>
      </aside>
    </section>
  </div>
  <div class="viewer" id="artifactViewer" aria-hidden="true">
    <div class="viewer-card">
      <div class="viewer-head"><div><div class="title-sm" id="viewerTitle">图片预览</div><div class="desc" id="viewerCaption">未选择图片证据</div></div><div class="viewer-actions"><a class="artifact-link" id="viewerOpenLink" href="#" target="_blank" rel="noopener noreferrer">打开原图</a><button class="btn" id="viewerCloseBtn" type="button">关闭</button></div></div>
      <div class="viewer-stage"><img id="viewerImage" alt="artifact preview"></div>
    </div>
  </div>
  <script>
    const INDEX_URL = "./data/runs-index.json";
    const PAGE_SIZE = 10;
    const lifecycleStatusMeta = { in_progress: ["warn", "进行中"], awaiting_feedback: ["warn", "待反馈"], completed: ["ok", "已完成"], failed: ["danger", "失败"] };
    const resultStatusMeta = { verified: ["ok", "已验证"], partial: ["warn", "部分有效"], blocked: ["danger", "阻塞"], failed: ["danger", "失败"], unknown: ["neutral", "未给结果"] };
    const eventStatusMeta = { completed: ["ok", "完成"], in_progress: ["warn", "进行中"], blocked: ["danger", "阻塞"], failed: ["danger", "失败"] };
    const reviewStatusMeta = { valid: ["ok", "有效"], partial: ["warn", "部分有效"], invalid: ["danger", "无效"], unreviewed: ["neutral", "未复核"] };
    const DETAIL_FIELD_META = {
      acceptanceSignals: { label: "验收信号", view: "bullet-list", order: 10 }, actualOrder: { label: "实际顺序", view: "bullet-list", order: 12 }, affectedFiles: { label: "影响文件", view: "path-list", order: 14 }, artifactPaths: { label: "证据路径", view: "path-list", order: 16 }, buildStatus: { label: "构建状态", view: "text", order: 18 }, changedFiles: { label: "变更文件", view: "path-list", order: 20 }, codeUsed: { label: "使用代码", view: "paragraph", order: 22 }, completedPlanItems: { label: "已完成", view: "bullet-list", order: 24 }, currentOrder: { label: "当前顺序", view: "bullet-list", order: 26 }, currentStage: { label: "当前阶段", view: "text", order: 28 }, deviations: { label: "偏差说明", view: "bullet-list", order: 30 }, evidence: { label: "证据", view: "path-list", order: 32 }, filesChanged: { label: "变更文件", view: "path-list", order: 34 }, findings: { label: "发现", view: "bullet-list", order: 36 }, freshDeployEvidence: { label: "Fresh Deploy 证据", view: "paragraph", order: 38 }, freshDeployRequired: { label: "需要 Fresh Deploy", view: "text", order: 40 }, goal: { label: "目标", view: "paragraph", order: 42 }, impactScope: { label: "影响范围", view: "bullet-list", order: 44 }, implementationScope: { label: "实施范围", view: "bullet-list", order: 46 }, installStatus: { label: "安装状态", view: "text", order: 48 }, knownActualOrder: { label: "已知现状顺序", view: "bullet-list", order: 50 }, launchStatus: { label: "启动状态", view: "text", order: 52 }, mappingConfirmed: { label: "已确认映射", view: "text", order: 54 }, metadata: { label: "元数据", view: "paragraph", order: 56 }, mode: { label: "模式", view: "text", order: 58 }, module: { label: "模块", view: "text", order: 60 }, nextActions: { label: "下一步动作", view: "bullet-list", order: 62 }, nextAgent: { label: "下一角色", view: "text", order: 64 }, notCompleted: { label: "未完成", view: "bullet-list", order: 66 }, outOfScope: { label: "不在范围", view: "bullet-list", order: 68 }, pagePath: { label: "页面路径", view: "path-list", order: 70 }, partial: { label: "部分结论", view: "paragraph", order: 72 }, primaryFile: { label: "主要文件", view: "path-list", order: 74 }, requestedChain: { label: "请求链路", view: "bullet-list", order: 76 }, requestedTabOrder: { label: "目标页签顺序", view: "bullet-list", order: 78 }, residualRisks: { label: "残余风险", view: "bullet-list", order: 80 }, resolvedIssues: { label: "已解决", view: "bullet-list", order: 82 }, reviewedFiles: { label: "审查文件", view: "path-list", order: 84 }, riskLevel: { label: "风险等级", view: "text", order: 86 }, role: { label: "角色", view: "text", order: 88 }, rootCause: { label: "根因", view: "paragraph", order: 90 }, screenshotPaths: { label: "截图路径", view: "path-list", order: 92 }, screenshots: { label: "截图", view: "path-list", order: 94 }, secondaryFile: { label: "次要文件", view: "path-list", order: 96 }, signStatus: { label: "签名状态", view: "text", order: 98 }, smokeRoute: { label: "冒烟链路", view: "text", order: 100 }, sourceEventId: { label: "来源事件", view: "text", order: 102 }, sourceEventIds: { label: "来源事件集", view: "bullet-list", order: 104 }, stage: { label: "阶段", view: "text", order: 106 }, targetFiles: { label: "目标文件", view: "path-list", order: 108 }, targetOrder: { label: "目标顺序", view: "bullet-list", order: 110 }, targetPage: { label: "目标页面", view: "text", order: 112 }, testingGap: { label: "测试缺口", view: "paragraph", order: 114 }, validation: { label: "验证结论", view: "paragraph", order: 116 }, validationFocus: { label: "验证重点", view: "bullet-list", order: 118 }, validationMode: { label: "验证模式", view: "text", order: 120 }, validationNeeded: { label: "待验证", view: "paragraph", order: 122 }, verificationMode: { label: "验证方式", view: "text", order: 124 }, windowId: { label: "窗口 ID", view: "text", order: 126 }, windowName: { label: "窗口名称", view: "text", order: 128 }
    };
    const state = { indexRuns: [], runCache: new Map(), artifactTextCache: new Map(), selectedRunId: null, selectedEventId: null, currentPage: 1, runSearchQuery: "", runStatusFilter: "all", runTimeFilter: "all", viewerArtifactId: null, error: "" };

    function escapeHtml(value) { return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
    function chip(status, meta) { const pair = (meta && meta[status]) || ["neutral", status ?? "未知"]; return `<span class="chip ${pair[0]}">${escapeHtml(pair[1])}</span>`; }
    function labelFor(status, meta) { return ((meta && meta[status]) || ["neutral", status ?? "未知"])[1]; }
    function resultChip(resultStatus) { return chip(resultStatus || "unknown", resultStatusMeta); }
    function formatTime(value) { if (!value) return "--"; const date = new Date(value); if (Number.isNaN(date.getTime())) return String(value).replace("T", " ").slice(0, 16); const y = date.getFullYear(), m = String(date.getMonth() + 1).padStart(2, "0"), d = String(date.getDate()).padStart(2, "0"), hh = String(date.getHours()).padStart(2, "0"), mm = String(date.getMinutes()).padStart(2, "0"); return `${y}-${m}-${d} ${hh}:${mm}`; }
    function formatNumber(value) { return new Intl.NumberFormat("zh-CN").format(value || 0); }
    function formatScalar(value) { return typeof value === "boolean" ? (value ? "是" : "否") : String(value ?? ""); }
    function eventTypeLabel(eventType) { const map = { "run.started": "运行开始", "run.completed": "运行完成", "run.failed": "运行失败", "run.blocked": "运行阻塞", "run.updated": "运行更新", "agent.input": "角色输入", "agent.output": "角色输出", "artifact.created": "证据生成", "manual.reviewed": "人工复核", milestone: "里程碑", "verification.stage.started": "验证开始", "verification.stage.completed": "验证完成", "workflow.stage.started": "阶段开始", "workflow.stage.progress": "阶段推进", "workflow.stage.updated": "阶段更新", "workflow.stage.completed": "阶段完成", "workflow.stage.approved": "阶段批准" }; return map[eventType] || eventType; }
    function artifactKindLabel(kind) { const map = { screenshot: "截图", log: "日志", diff: "Diff", patch: "Patch", json: "JSON", artifact: "证据" }; return map[kind] || kind || "证据"; }
    function isImageArtifact(artifact) { const path = (artifact.path || "").toLowerCase(); return ["png", "jpg", "jpeg", "gif", "webp", "svg"].some(ext => path.endsWith(`.${ext}`)); }
    function isTextArtifact(artifact) { const path = (artifact.path || "").toLowerCase(); return ["txt", "log", "json", "md", "patch", "diff", "ets", "toml"].some(ext => path.endsWith(`.${ext}`)); }
    async function fetchJson(url) { const response = await fetch(url, { cache: "no-store" }); if (!response.ok) throw new Error(`读取失败：${url} (${response.status})`); return response.json(); }
    async function fetchJsonl(url) { const response = await fetch(url, { cache: "no-store" }); if (response.status === 404) return []; if (!response.ok) throw new Error(`读取失败：${url} (${response.status})`); const text = await response.text(); return text.split(/\r?\n/).map(line => line.trim()).filter(Boolean).map(line => JSON.parse(line)); }
    function joinPath(base, child) { if (!child) return base; const left = base.endsWith("/") ? base.slice(0, -1) : base; const right = child.startsWith("/") ? child.slice(1) : child; return `${left}/${right}`; }
    function dirname(path) { const parts = String(path || "").split("/"); parts.pop(); return parts.join("/"); }
    function normalizeIndexPath(path) { if (!path) return path; const value = String(path).replace(/\\/g, "/"); if (/^(https?:)?\/\//.test(value) || value.startsWith("./") || value.startsWith("../") || value.startsWith("/")) return value; if (value.startsWith("data/")) return `./${value}`; if (value.startsWith("runs/")) return `./data/${value}`; return `./${value}`; }
    function normalizeIndexEntry(entry) { return { ...entry, runDir: normalizeIndexPath(entry.runDir), summaryPath: normalizeIndexPath(entry.summaryPath), eventsPath: normalizeIndexPath(entry.eventsPath), reviewsPath: normalizeIndexPath(entry.reviewsPath || `${dirname(entry.summaryPath)}/reviews.jsonl`), artifactsPath: normalizeIndexPath(entry.artifactsPath), resultStatus: entry.resultStatus || null }; }
    function normalizeReviewStatus(review) { if (!review || typeof review !== "object") return "unreviewed"; const value = review.reviewStatus || "unreviewed"; return ["valid", "partial", "invalid", "unreviewed"].includes(value) ? value : "unreviewed"; }
    function hasDetailValue(value) { if (Array.isArray(value)) return value.length > 0; if (value && typeof value === "object") return Object.keys(value).length > 0; return value !== null && value !== undefined && String(value).trim() !== ""; }
    function formatDetailValue(value) { if (Array.isArray(value)) return value.map(item => typeof item === "object" ? JSON.stringify(item, null, 2) : formatScalar(item)).join("，"); if (value && typeof value === "object") return Object.entries(value).map(([key, item]) => `${key}: ${Array.isArray(item) ? item.map(formatScalar).join("，") : formatScalar(item)}`).join("，"); return formatScalar(value); }

    function conciseEventSummary(event) { return event.outputSummary || event.inputSummary || "该事件未提供额外摘要。"; }

    function normalizeSummary(entry, summary, events) {

    function buildRunView(entry, summary, rawEvents, reviews) {

      });
      (reviews || []).forEach(review => { if (review && review.eventId) reviewByEvent.set(review.eventId, review); });

        return { id: event.eventId, step: index + 1, time: formatTime(event.timestamp), timestamp: event.timestamp, agent: event.agent || "Main", type: eventTypeLabel(event.eventType), rawType: event.eventType, title: event.title, status: event.status || "completed", resultStatus: payload.resultStatus || null, reviewStatus: normalizeReviewStatus(review), reviewComment: review && review.comment ? review.comment : "", reviewedAt: review && review.reviewedAt ? review.reviewedAt : "", reviewedBy: review && review.reviewedBy ? review.reviewedBy : "", inputSummary: payload.inputSummary || (event.eventType === "run.started" ? `目标：${summary.goal}` : payload.goal ? `目标：${payload.goal}` : payloadSummary) || "", outputSummary: payload.outputSummary || payload.summaryText || (event.eventType === "run.started" ? `模式：${summary.mode}` : payloadSummary) || "", keyPoints: Array.isArray(payload.keyPoints) ? payload.keyPoints : [], details: pickPayloadDetails(payload), artifacts: relatedArtifactIds };

    async function loadRun(runId) {
      if (state.runCache.has(runId)) return state.runCache.get(runId);
      const entry = state.indexRuns.find(item => item.runId === runId);
      if (!entry) throw new Error(`未找到 run：${runId}`);
      const [summary, rawEvents, reviews] = await Promise.all([fetchJson(entry.summaryPath), fetchJsonl(entry.eventsPath), fetchJsonl(entry.reviewsPath)]);
      const run = buildRunView(entry, summary, rawEvents, reviews);
      state.runCache.set(runId, run);
      return run;
    }

    async function loadIndex() {
      const payload = await fetchJson(INDEX_URL);
      const runs = (Array.isArray(payload) ? payload : (payload.runs || [])).map(normalizeIndexEntry);
      state.indexRuns = runs.sort((a, b) => String(b.updatedAt || "").localeCompare(String(a.updatedAt || "")));
    }

    function getFilteredRuns() {
      const now = new Date();
      return state.indexRuns.filter(run => {
        const query = state.runSearchQuery.trim().toLowerCase();
        const matchQuery = !query || (run.title || "").toLowerCase().includes(query) || (run.goal || "").toLowerCase().includes(query);
        const matchStatus = state.runStatusFilter === "all" || run.status === state.runStatusFilter || run.resultStatus === state.runStatusFilter;
        let matchTime = true;
        if (state.runTimeFilter !== "all") {
          const createdAt = new Date(run.createdAt);
          const diff = now.getTime() - createdAt.getTime();
          const rangeMap = { "24h": 24 * 60 * 60 * 1000, "7d": 7 * 24 * 60 * 60 * 1000, "30d": 30 * 24 * 60 * 60 * 1000 };

    }

    function getSelectedRun() { return state.selectedRunId ? state.runCache.get(state.selectedRunId) || null : null; }
    function getSelectedEvent() { const run = getSelectedRun(); if (!run || !state.selectedEventId) return null; return run.events.find(event => event.id === state.selectedEventId) || null; }

    function renderMetrics(filteredRuns) {

      const reviewInvalid = filteredRuns.reduce((sum, run) => sum + ((run.reviewStats && run.reviewStats.invalid) || 0), 0);
      const reviewedTotal = reviewValid + reviewPartial + reviewInvalid;
      const validity = reviewedTotal ? Math.round((reviewValid / reviewedTotal) * 100) : 0;
      document.getElementById("metricRuns").textContent = formatNumber(runCount);
      document.getElementById("metricEvents").textContent = formatNumber(eventCount);
      document.getElementById("metricArtifacts").textContent = formatNumber(artifactCount);
      document.getElementById("metricValidity").textContent = `${validity}%`;
    }

    function renderRuns(filteredRuns) {
      const totalPages = Math.max(1, Math.ceil(filteredRuns.length / PAGE_SIZE));
      if (state.currentPage > totalPages) state.currentPage = totalPages;
      const startIndex = (state.currentPage - 1) * PAGE_SIZE;
      const pagedRuns = filteredRuns.slice(startIndex, startIndex + PAGE_SIZE);
      document.getElementById("runCount").textContent = `${filteredRuns.length} 条`;
      document.getElementById("pageInfo").textContent = filteredRuns.length ? `第 ${state.currentPage} / ${totalPages} 页，共 ${filteredRuns.length} 条` : "暂无符合条件的运行记录";
      document.getElementById("prevPage").disabled = state.currentPage <= 1;
      document.getElementById("nextPage").disabled = state.currentPage >= totalPages;
      document.getElementById("runList").innerHTML = pagedRuns.length ? pagedRuns.map(run => `
        <article class="run-card ${state.selectedRunId === run.runId ? "active" : ""}" data-run="${escapeHtml(run.runId)}">
          <div class="row"><div><div class="title-sm">${escapeHtml(run.title)}</div><div class="desc">${escapeHtml(run.latestSummary || run.goal || "暂无摘要")}</div></div><div class="signals">${chip(run.status, lifecycleStatusMeta)}${resultChip(run.resultStatus)}</div></div>
          <div class="signals"><span class="signal">${escapeHtml(run.mode || "--")}</span><span class="signal">${formatNumber(run.eventCount || 0)} 个事件</span><span class="signal">最近角色 ${escapeHtml(run.latestAgent || "--")}</span></div>

    function renderRunDetail() {

    function findArtifactById(id) { const run = getSelectedRun(); return run ? run.artifacts.find(item => item.id === id) || null : null; }

    function renderActionButtons(artifacts) {
      const firstImage = artifacts.find(item => item.url && isImageArtifact(item));
      const actions = [];
      if (firstImage) actions.push(`<button class="action-btn" type="button" data-artifact-preview="${escapeHtml(firstImage.id)}">查看首张截图</button>`);

      return `<div class="detail-summary">${artifacts.slice(0, 4).map(artifact => `<div class="summary-block"><div class="meta">${escapeHtml(artifactKindLabel(artifact.kind))}</div><div class="value">${escapeHtml(artifact.title || "未命名证据")}</div></div>`).join("")}</div>`;
    }

    function renderInspector() {

        document.getElementById("targetChip").className = "chip neutral";
        document.getElementById("detailContent").innerHTML = `<div class="${state.error ? "error" : "empty"}">${state.error || "请选择中间事件线中的一个步骤，右侧会显示输入、输出、关键结论和关联证据。"}</div>`;

    async function hydrateTextArtifacts(artifacts) {
      await Promise.all(artifacts.filter(isTextArtifact).map(async artifact => {
        const target = document.getElementById(`artifact-preview-${artifact.id}`);
        if (!target) return;
        if (state.artifactTextCache.has(artifact.id)) { target.textContent = state.artifactTextCache.get(artifact.id); return; }
        try {
          const response = await fetch(artifact.url, { cache: "no-store" });
          if (!response.ok) throw new Error(String(response.status));
          const text = await response.text();
          const preview = text.split(/\r?\n/).slice(0, 20).join("\n");
          state.artifactTextCache.set(artifact.id, preview);
          target.textContent = preview || "文件存在，但内容为空。";
        } catch (error) {
          target.textContent = "无法读取文本证据，请确认页面通过本地静态服务打开，且 artifacts 文件可访问。";
        }
      }));
    }

    async function ensureSelectedRunLoaded() {
      if (!state.indexRuns.length) { state.selectedRunId = null; state.selectedEventId = null; return; }
      const filteredRuns = getFilteredRuns();
      if (!filteredRuns.length) { state.selectedRunId = null; state.selectedEventId = null; return; }
      if (!filteredRuns.find(run => run.runId === state.selectedRunId)) state.selectedRunId = filteredRuns[0].runId;
      const run = await loadRun(state.selectedRunId);
      if (!run.events.find(event => event.id === state.selectedEventId)) state.selectedEventId = run.events[0] ? run.events[0].id : null;
    }

    function bind() {
      document.querySelectorAll("[data-run]").forEach(node => { node.onclick = async () => { state.selectedRunId = node.dataset.run; await ensureSelectedRunLoaded(); const run = getSelectedRun(); state.selectedEventId = run && run.events[0] ? run.events[0].id : null; render(); }; });
      document.querySelectorAll("[data-event]").forEach(node => { node.onclick = () => { state.selectedEventId = node.dataset.event; renderRunDetail(); renderInspector(); bind(); }; });
      document.querySelectorAll("[data-artifact-preview]").forEach(node => { node.onclick = event => { event.stopPropagation(); openArtifactViewerById(node.dataset.artifactPreview); }; });
      document.querySelectorAll("[data-scroll-artifacts]").forEach(node => { node.onclick = () => { document.getElementById("artifactSection")?.scrollIntoView({ behavior: "smooth", block: "start" }); }; });
      document.getElementById("runSearch").oninput = async event => { state.runSearchQuery = event.target.value.trim(); state.currentPage = 1; await ensureSelectedRunLoaded(); render(); };
      document.getElementById("statusFilter").onchange = async event => { state.runStatusFilter = event.target.value; state.currentPage = 1; await ensureSelectedRunLoaded(); render(); };
      document.getElementById("timeFilter").onchange = async event => { state.runTimeFilter = event.target.value; state.currentPage = 1; await ensureSelectedRunLoaded(); render(); };
      document.getElementById("prevPage").onclick = () => { if (state.currentPage > 1) { state.currentPage -= 1; render(); } };
      document.getElementById("nextPage").onclick = () => { const totalPages = Math.max(1, Math.ceil(getFilteredRuns().length / PAGE_SIZE)); if (state.currentPage < totalPages) { state.currentPage += 1; render(); } };
      document.getElementById("reloadBtn").onclick = async () => { await boot(); };
      document.getElementById("viewerCloseBtn").onclick = () => { closeArtifactViewer(); };
      document.getElementById("artifactViewer").onclick = event => { if (event.target.id === "artifactViewer") closeArtifactViewer(); };
      document.onkeydown = event => { if (event.key === "Escape" && state.viewerArtifactId) closeArtifactViewer(); };
    }

    function render() { const filteredRuns = getFilteredRuns(); renderMetrics(filteredRuns); renderRuns(filteredRuns); renderRunDetail(); renderInspector(); bind(); }

    async function boot() {
      state.error = "";
      state.runCache.clear();
      state.artifactTextCache.clear();
      try {
        await loadIndex();
        await ensureSelectedRunLoaded();
      } catch (error) {
        state.indexRuns = [];
        state.runCache.clear();
        state.selectedRunId = null;
        state.selectedEventId = null;
        state.error = ["无法读取 recorder 落盘数据。", "请确认以下条件：", "1. 已执行 recorder.py 并生成 summary.json / events.jsonl / artifacts。", "2. agent-observer/data/runs-index.json 已存在。", "3. 页面通过本地静态服务打开，而不是直接双击 file://。"].join("<br>");
      } finally {
        render();
      }
    }

    boot();
  </script>
</body>
</html>
